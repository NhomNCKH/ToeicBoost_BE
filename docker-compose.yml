services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: toeic-api-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - '127.0.0.1:3001:3001'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: 512m
