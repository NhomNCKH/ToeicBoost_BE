name: 🔍 Check App Status

on:
  workflow_dispatch:

jobs:
  check:
    name: Check Application Status
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Check server status
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 5m
        script: |
          echo "🔍 CHECKING APPLICATION STATUS"
          echo "============================="
          
          BASE_DIR="/var/www/toeicai/ToeicBoost_BE"
          
          if [ ! -d "$BASE_DIR" ]; then
            echo "❌ Base project directory not found: $BASE_DIR"
            exit 1
          fi
          
          echo "📁 Directory Structure:"
          ls -la "$BASE_DIR"
          
          # Check if using new structure (current/backup) or old structure
          if [ -d "$BASE_DIR/current" ]; then
            echo "✅ Using new deployment structure"
            cd "$BASE_DIR/current"
            DEPLOYMENT_TYPE="new"
          else
            echo "⚠️ Using old deployment structure"
            cd "$BASE_DIR"
            DEPLOYMENT_TYPE="old"
          fi
          
          echo "📍 Working directory: $(pwd)"
          
          # Check process
          echo "📊 Process Status:"
          if [ -f app.pid ]; then
            APP_PID=$(cat app.pid)
            echo "Stored PID: $APP_PID"
            
            if kill -0 $APP_PID 2>/dev/null; then
              echo "✅ Process is running"
              echo "Process info:"
              ps -p $APP_PID -o pid,ppid,cmd,etime,pcpu,pmem 2>/dev/null || echo "Process details not available"
            else
              echo "❌ Process not running"
            fi
          else
            echo "❌ PID file not found"
          fi
          
          # Check port
          echo ""
          echo "🔌 Port Status:"
          if sudo lsof -i:3001 2>/dev/null; then
            echo "✅ Port 3001 is bound"
          else
            echo "❌ Port 3001 not bound"
          fi
          
          # Check HTTP
          echo ""
          echo "🌐 HTTP Status:"
          if curl -s --connect-timeout 3 --max-time 5 http://localhost:3001/ >/dev/null 2>&1; then
            echo "✅ HTTP endpoint responding"
            echo "Response preview:"
            curl -s --connect-timeout 3 --max-time 5 http://localhost:3001/ | head -3 2>/dev/null || echo "Could not get response preview"
          else
            echo "❌ HTTP endpoint not responding"
          fi
          
          # Show recent logs
          echo ""
          echo "📋 Recent Application Logs:"
          if [ -f app.log ]; then
            echo "Last 15 lines of app.log:"
            tail -15 app.log
          else
            echo "❌ app.log not found"
          fi
          
          # Git status
          echo ""
          echo "📋 Git Status:"
          echo "Current commit: $(git log --oneline -1 2>/dev/null || echo 'Git info not available')"
          echo "Branch: $(git branch --show-current 2>/dev/null || echo 'Unknown')"
          
          # System resources
          echo ""
          echo "💻 System Resources:"
          echo "Memory usage:"
          free -h | head -2
          echo "Disk usage:"
          df -h / | tail -1
          
          echo ""
          echo "🔍 Status check completed!"