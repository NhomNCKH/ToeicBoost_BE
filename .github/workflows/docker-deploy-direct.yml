name: Docker Direct Deploy (No Registry)

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even if tests fail'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Test only (optional)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.force_deploy != 'true'
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm run test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        DB_DATABASE: test_db

  # Deploy directly on server
  deploy:
    name: Deploy on Server
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || github.event.inputs.force_deploy == 'true')
    timeout-minutes: 20
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Check required secrets
      run: |
        if [ -z "${{ secrets.SERVER_HOST }}" ]; then
          echo "❌ SERVER_HOST secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.SERVER_USER }}" ]; then
          echo "❌ SERVER_USER secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
          echo "❌ SERVER_SSH_KEY secret is not set"
          exit 1
        fi
        echo "✅ All required secrets are configured"
        
    - name: 📤 Upload source code to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "."
        target: "/tmp/toeicai-deploy-${{ github.sha }}"
        rm: true
        
    - name: 🚀 Build and Deploy on Server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 15m
        sync: true
        script: |
          echo "🚀 STARTING DIRECT DOCKER DEPLOYMENT..."
          
          # Set variables
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          TEMP_DIR="/tmp/toeicai-deploy-${{ github.sha }}"
          IMAGE_TAG="local-${{ github.sha }}"
          
          # Check Docker installation
          echo "🔍 Checking Docker installation..."
          docker --version || (echo "❌ Docker not installed" && exit 1)
          
          # Check Docker Compose
          if command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE="docker-compose"
            echo "✅ Using docker-compose: $(docker-compose --version)"
          elif docker compose version &> /dev/null; then
            DOCKER_COMPOSE="docker compose"
            echo "✅ Using docker compose: $(docker compose version)"
          else
            echo "❌ Docker Compose not installed"
            exit 1
          fi
          
          # Create project directory
          sudo mkdir -p "$PROJECT_DIR"
          sudo chown -R $USER:$USER /var/www/toeicai
          
          # Stop existing containers
          echo "🛑 Stopping existing containers..."
          cd "$PROJECT_DIR" 2>/dev/null || true
          if [ -f "docker-compose.production.yml" ]; then
            $DOCKER_COMPOSE -f docker-compose.production.yml down --timeout 30 || true
          fi
          
          # Copy new source code
          echo "📁 Copying source code..."
          rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
          if [ -d "$PROJECT_DIR" ]; then
            mv "$PROJECT_DIR" "$PROJECT_DIR.backup"
          fi
          mv "$TEMP_DIR" "$PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Build Docker image locally
          echo "🏗️ Building Docker image locally..."
          docker build -t "toeicai-api:${IMAGE_TAG}" .
          
          # Update docker-compose to use local image
          echo "🔧 Updating docker-compose configuration..."
          sed -i "s|image: .*|image: toeicai-api:${IMAGE_TAG}|g" docker-compose.production.yml
          
          # Set environment variables
          export DOCKER_REGISTRY="local"
          export IMAGE_TAG="${IMAGE_TAG}"
          export COMPOSE_PROJECT_NAME="toeicai"
          
          # Start services
          echo "🚀 Starting services..."
          $DOCKER_COMPOSE -f docker-compose.production.yml up -d
          
          # Wait for services
          echo "⏳ Waiting for services to start..."
          sleep 30
          
          # Health check
          echo "🏥 Performing health check..."
          for i in {1..10}; do
            if curl -s --connect-timeout 5 --max-time 10 http://localhost:3001/health >/dev/null 2>&1; then
              echo "✅ API health check passed!"
              break
            elif [ $i -eq 10 ]; then
              echo "❌ API health check failed after 10 attempts"
              echo "📋 Container logs:"
              $DOCKER_COMPOSE -f docker-compose.production.yml logs api --tail=50
              
              # Rollback
              if [ -d "$PROJECT_DIR.backup" ]; then
                echo "🔄 Rolling back..."
                $DOCKER_COMPOSE -f docker-compose.production.yml down
                cd ..
                rm -rf "$PROJECT_DIR"
                mv "$PROJECT_DIR.backup" "$PROJECT_DIR"
                cd "$PROJECT_DIR"
                $DOCKER_COMPOSE -f docker-compose.production.yml up -d
              fi
              exit 1
            else
              echo "⏳ API health check attempt $i/10..."
              sleep 5
            fi
          done
          
          # Cleanup
          echo "🧹 Cleaning up..."
          rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
          docker image prune -f
          
          # Show status
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "📊 Final status:"
          $DOCKER_COMPOSE -f docker-compose.production.yml ps
          
          echo "📋 Service URLs:"
          echo "  - API: http://$(hostname -I | awk '{print $1}'):3001"
          echo "  - Health: http://$(hostname -I | awk '{print $1}'):3001/health"
          
    - name: ✅ Success notification
      if: success()
      run: |
        echo "🎉 Direct Docker deployment completed successfully!"
        echo "📊 Deployment Summary:"
        echo "  - Method: Direct build on server"
        echo "  - Image: toeicai-api:local-${{ github.sha }}"
        echo "  - Server: ${{ secrets.SERVER_HOST }}"
        echo "  - Status: ✅ SUCCESS"
        
    - name: ❌ Failure notification
      if: failure()
      run: |
        echo "❌ Direct Docker deployment failed!"
        echo "Please check the logs above for details."