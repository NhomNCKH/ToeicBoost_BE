name: Debug Deployment

on:
  workflow_dispatch: # Manual trigger only

jobs:
  debug-ssh:
    name: Debug SSH Connection
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Test Basic SSH Connection
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        debug: true
        script: |
          echo "=== BASIC CONNECTION TEST ==="
          echo "✅ SSH Connection successful!"
          echo "Current user: $(whoami)"
          echo "Current directory: $(pwd)"
          echo "Server time: $(date)"
          echo "Home directory: $HOME"
          
    - name: 🔍 Test GitHub SSH Access from Server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        debug: true
        script: |
          echo "=== GITHUB SSH TEST ==="
          echo "Testing GitHub SSH connection..."
          
          # Check if GitHub deploy key exists
          if [ -f ~/.ssh/github_deploy ]; then
            echo "✅ GitHub deploy key exists"
            ls -la ~/.ssh/github_deploy*
          else
            echo "❌ GitHub deploy key missing"
            echo "Available SSH keys:"
            ls -la ~/.ssh/
          fi
          
          # Check SSH config
          if [ -f ~/.ssh/config ]; then
            echo "✅ SSH config exists"
            cat ~/.ssh/config
          else
            echo "❌ SSH config missing"
          fi
          
          # Test GitHub connection
          echo "Testing GitHub SSH..."
          ssh -T git@github.com 2>&1 || echo "GitHub SSH test completed"
          
    - name: 🔍 Test Project Directory
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        debug: true
        script: |
          echo "=== PROJECT DIRECTORY TEST ==="
          
          # Check if project directory exists
          if [ -d "/var/www/toeicai/ToeicBoost_BE" ]; then
            echo "✅ Project directory exists"
            cd /var/www/toeicai/ToeicBoost_BE
            echo "Current directory: $(pwd)"
            echo "Git status:"
            git status || echo "Git status failed"
            echo "Git remote:"
            git remote -v || echo "Git remote failed"
          else
            echo "❌ Project directory missing"
            echo "Creating directory structure..."
            mkdir -p /var/www/toeicai
            cd /var/www/toeicai
            echo "Current directory: $(pwd)"
            ls -la
          fi
          
    - name: 🔍 Test Git Clone/Pull
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        debug: true
        script: |
          echo "=== GIT OPERATIONS TEST ==="
          
          cd /var/www/toeicai
          
          if [ -d "ToeicBoost_BE" ]; then
            echo "Project exists, testing git pull..."
            cd ToeicBoost_BE
            
            # Set remote to SSH
            git remote set-url origin git@github.com:NhomNCKH/ToeicBoost_BE.git
            echo "Remote URL set to SSH"
            
            # Test fetch
            echo "Testing git fetch..."
            git fetch origin main 2>&1 || echo "Git fetch failed"
            
          else
            echo "Project doesn't exist, testing git clone..."
            git clone git@github.com:NhomNCKH/ToeicBoost_BE.git 2>&1 || echo "Git clone failed"
          fi
          
    - name: 🔍 Test Node.js Environment
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        debug: true
        script: |
          echo "=== NODE.JS ENVIRONMENT TEST ==="
          
          # Check Node.js
          echo "Node.js version:"
          node --version || echo "Node.js not found"
          
          # Check npm
          echo "npm version:"
          npm --version || echo "npm not found"
          
          # Check if project has package.json
          if [ -d "/var/www/toeicai/ToeicBoost_BE" ]; then
            cd /var/www/toeicai/ToeicBoost_BE
            if [ -f "package.json" ]; then
              echo "✅ package.json exists"
              echo "Project dependencies:"
              head -20 package.json
            else
              echo "❌ package.json missing"
            fi
          fi
          
    - name: 🔍 Test Port and Process
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        debug: true
        script: |
          echo "=== PORT AND PROCESS TEST ==="
          
          # Check what's running on port 3001
          echo "Checking port 3001:"
          sudo lsof -i :3001 || echo "Nothing running on port 3001"
          
          # Check for node processes
          echo "Node processes:"
          pgrep -f node || echo "No node processes found"
          
          # Check system resources
          echo "System info:"
          free -h
          df -h
          
          # Check if we can bind to port 3001
          echo "Testing port availability:"
          nc -z localhost 3001 && echo "Port 3001 is in use" || echo "Port 3001 is available"