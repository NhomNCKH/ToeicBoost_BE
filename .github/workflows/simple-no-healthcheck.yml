name: Simple Deploy No Health Check

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    name: Simple Deploy (No Health Check)
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy Without Health Check
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        debug: true
        script: |
          echo "🚀 Simple deployment without health check..."
          
          # Setup directory
          sudo mkdir -p /var/www/toeicai || mkdir -p /var/www/toeicai
          sudo chown -R $USER:$USER /var/www/toeicai 2>/dev/null || true
          cd /var/www/toeicai
          
          # Clone/update project
          if [ -d "ToeicBoost_BE" ]; then
            cd ToeicBoost_BE
            git pull origin main || echo "Git pull failed"
          else
            git clone https://github.com/NhomNCKH/ToeicBoost_BE.git
            cd ToeicBoost_BE
          fi
          
          # Kill existing processes
          pkill -f "node.*dist/main" 2>/dev/null || echo "No process to kill"
          sleep 2
          
          # Create minimal .env
          cat > .env << 'EOF'
NODE_ENV=production
APP_PORT=3001
EOF
          
          # Install and build
          npm install --production=false
          npm run build
          
          # Start app and immediately exit (no health check)
          echo "Starting application..."
          nohup npm run start:prod > app.log 2>&1 &
          APP_PID=$!
          
          echo "✅ Application started with PID: $APP_PID"
          echo "✅ Logs will be written to app.log"
          echo "✅ Deployment completed - no health check performed"
          
          # Just show initial status
          sleep 5
          if kill -0 $APP_PID 2>/dev/null; then
            echo "✅ Process still running after 5 seconds"
          else
            echo "❌ Process died within 5 seconds"
            echo "Quick logs check:"
            cat app.log 2>/dev/null || echo "No logs yet"
          fi