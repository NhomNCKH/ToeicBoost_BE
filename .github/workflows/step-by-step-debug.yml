name: Step by Step Debug

on:
  workflow_dispatch: # Manual trigger only

jobs:
  debug:
    name: Debug Each Step
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Debug SSH Connection
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 1m
        debug: true
        script: echo "SSH works"
        
    - name: 🔍 Debug Basic Commands
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 1m
        debug: true
        script: |
          pwd
          whoami
          date
          
    - name: 🔍 Debug System Check
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        debug: true
        script: |
          echo "=== System Info ==="
          uname -a
          echo "=== Node.js ==="
          node --version 2>/dev/null || echo "Node.js not found"
          echo "=== npm ==="
          npm --version 2>/dev/null || echo "npm not found"
          echo "=== Git ==="
          git --version 2>/dev/null || echo "Git not found"
          echo "=== Disk Space ==="
          df -h | head -3
          echo "=== Memory ==="
          free -h
          
    - name: 🔍 Debug Directory Operations
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        debug: true
        script: |
          echo "=== Directory Check ==="
          ls -la /var/ 2>/dev/null || echo "/var not accessible"
          
          echo "=== Creating test directory ==="
          mkdir -p /tmp/test-deploy
          cd /tmp/test-deploy
          echo "Test file" > test.txt
          ls -la
          
          echo "=== Cleanup ==="
          rm -rf /tmp/test-deploy
          echo "✅ Directory operations work"
          
    - name: 🔍 Debug Process Operations
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        debug: true
        script: |
          echo "=== Process Check ==="
          ps aux | head -5
          
          echo "=== Port Check ==="
          netstat -tlnp | grep :3001 || echo "Port 3001 not in use"
          
          echo "=== Kill Test ==="
          pkill -f "nonexistent-process" 2>/dev/null || echo "pkill works (no process to kill)"
          
          echo "✅ Process operations work"