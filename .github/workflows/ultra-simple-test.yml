name: Ultra Simple SSH Test

on:
  workflow_dispatch: # Manual trigger only

jobs:
  test:
    name: Ultra Simple Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Test 1 - Basic Echo
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 60s
        debug: true
        script: |
          echo "Hello from server!"
          
    - name: 🔍 Test 2 - Basic Commands
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 60s
        debug: true
        script: |
          whoami
          pwd
          date
          
    - name: 🔍 Test 3 - Check System
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 60s
        debug: true
        script: |
          echo "System check..."
          uname -a
          df -h | head -3
          free -h
          
    - name: 🔍 Test 4 - Check Node
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 60s
        debug: true
        script: |
          echo "Checking Node.js..."
          which node || echo "Node not found"
          node --version || echo "Node version failed"
          which npm || echo "npm not found"
          npm --version || echo "npm version failed"