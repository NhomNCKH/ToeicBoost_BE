name: 🔧 Setup Server Resources

on:
  workflow_dispatch:

jobs:
  setup:
    name: Setup Server Resources
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Check and setup server resources
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        script: |
          echo "🔍 CHECKING SERVER RESOURCES"
          echo "============================"
          
          # Check current memory
          echo "💾 Current Memory Status:"
          free -h
          
          # Check disk space
          echo ""
          echo "💽 Disk Space:"
          df -h /
          
          # Check swap
          echo ""
          echo "🔄 Swap Status:"
          swapon --show || echo "No swap configured"
          
          # Get memory info
          TOTAL_RAM=$(free -m | awk 'NR==2{printf "%.0f", $2}')
          AVAILABLE_RAM=$(free -m | awk 'NR==2{printf "%.0f", $7}')
          SWAP_SIZE=$(free -m | awk 'NR==3{printf "%.0f", $2}')
          
          echo ""
          echo "📊 Memory Analysis:"
          echo "Total RAM: ${TOTAL_RAM}MB"
          echo "Available RAM: ${AVAILABLE_RAM}MB"
          echo "Swap Size: ${SWAP_SIZE}MB"
          
          # Check if we need swap
          if [ "$TOTAL_RAM" -lt 2048 ]; then
            echo ""
            echo "⚠️ LOW RAM DETECTED (${TOTAL_RAM}MB < 2GB)"
            
            if [ "$SWAP_SIZE" -eq 0 ]; then
              echo "🔧 Setting up swap file..."
              
              # Check available disk space
              AVAILABLE_DISK=$(df / | awk 'NR==2 {print $4}')
              AVAILABLE_DISK_GB=$((AVAILABLE_DISK / 1024 / 1024))
              
              if [ "$AVAILABLE_DISK_GB" -gt 2 ]; then
                echo "✅ Sufficient disk space available"
                echo "📝 Creating 1GB swap file..."
                
                # Create swap file
                sudo fallocate -l 1G /swapfile || {
                  echo "fallocate failed, using dd..."
                  sudo dd if=/dev/zero of=/swapfile bs=1024 count=1048576
                }
                
                # Set permissions
                sudo chmod 600 /swapfile
                
                # Make swap
                sudo mkswap /swapfile
                
                # Enable swap
                sudo swapon /swapfile
                
                # Add to fstab for persistence
                if ! grep -q "/swapfile" /etc/fstab; then
                  echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
                fi
                
                # Verify swap
                echo "✅ Swap setup completed:"
                swapon --show
                free -h
                
              else
                echo "❌ Insufficient disk space for swap"
              fi
            else
              echo "✅ Swap already configured (${SWAP_SIZE}MB)"
            fi
          else
            echo "✅ RAM is sufficient (${TOTAL_RAM}MB >= 2GB)"
          fi
          
          # Check running processes
          echo ""
          echo "🔍 Current Node.js processes:"
          ps aux | grep -E "(node|npm)" | grep -v grep || echo "No Node.js processes running"
          
          # Check port usage
          echo ""
          echo "🔌 Port usage:"
          sudo netstat -tlnp | grep -E ":(3000|3001|8000|8080)" || echo "No common web ports in use"
          
          # System load
          echo ""
          echo "📈 System Load:"
          uptime
          
          # Memory pressure check
          echo ""
          echo "🔍 Memory Pressure:"
          if [ -f /proc/pressure/memory ]; then
            cat /proc/pressure/memory
          else
            echo "Memory pressure info not available"
          fi
          
          echo ""
          echo "🎉 Server resource check completed!"
          
    - name: ✅ Success notification
      if: success()
      run: echo "🎉 Server resources checked and optimized!"
      
    - name: ❌ Failure notification
      if: failure()
      run: echo "❌ Server resource setup failed"