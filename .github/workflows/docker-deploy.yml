name: Docker Production Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔍 Lint code
      run: npm run lint
      
    - name: 🧪 Run tests
      run: npm run test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        DB_DATABASE: test_db
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        
    - name: 🏗️ Build application
      run: npm run build

  # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔑 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 📋 Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 🏗️ Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        
    - name: 🔍 Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: 📤 Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Deploy to Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    timeout-minutes: 15
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        sync: true
        script: |
          echo "🚀 STARTING DOCKER DEPLOYMENT..."
          
          # Set variables
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG="latest"
          
          # Create project directory
          sudo mkdir -p "$PROJECT_DIR"
          sudo chown -R $USER:$USER /var/www/toeicai
          cd "$PROJECT_DIR"
          
          echo "📁 Working in: $(pwd)"
          
          # Login to GitHub Container Registry
          echo "🔑 Logging into container registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          
          # Pull latest image
          echo "📥 Pulling latest Docker image..."
          docker pull "${IMAGE_NAME}:${IMAGE_TAG}"
          
          # Stop existing containers gracefully
          echo "🛑 Stopping existing containers..."
          if docker-compose -f docker-compose.production.yml ps -q | grep -q .; then
            docker-compose -f docker-compose.production.yml down --timeout 30
          else
            echo "No existing containers found"
          fi
          
          # Clean up unused images and containers
          echo "🧹 Cleaning up unused Docker resources..."
          docker system prune -f
          
          # Set environment variables for docker-compose
          export DOCKER_REGISTRY="${{ env.REGISTRY }}/${{ github.repository_owner }}"
          export IMAGE_TAG="${IMAGE_TAG}"
          
          # Start services
          echo "🚀 Starting services with Docker Compose..."
          docker-compose -f docker-compose.production.yml up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to be healthy..."
          timeout=300  # 5 minutes
          elapsed=0
          
          while [ $elapsed -lt $timeout ]; do
            if docker-compose -f docker-compose.production.yml ps | grep -q "Up (healthy)"; then
              echo "✅ Services are healthy!"
              break
            fi
            
            echo "⏳ Waiting for services... ($elapsed/$timeout seconds)"
            sleep 10
            elapsed=$((elapsed + 10))
          done
          
          if [ $elapsed -ge $timeout ]; then
            echo "❌ Services failed to become healthy within timeout"
            echo "📋 Container status:"
            docker-compose -f docker-compose.production.yml ps
            echo "📋 Container logs:"
            docker-compose -f docker-compose.production.yml logs --tail=50
            exit 1
          fi
          
          # Final health check
          echo "🏥 Performing final health check..."
          
          # Check if API is responding
          for i in {1..10}; do
            if curl -s --connect-timeout 5 --max-time 10 http://localhost:3001/health >/dev/null 2>&1; then
              echo "✅ API health check passed!"
              break
            elif [ $i -eq 10 ]; then
              echo "❌ API health check failed after 10 attempts"
              echo "📋 API container logs:"
              docker-compose -f docker-compose.production.yml logs api --tail=50
              exit 1
            else
              echo "⏳ API health check attempt $i/10..."
              sleep 5
            fi
          done
          
          # Show final status
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "📊 Final status:"
          docker-compose -f docker-compose.production.yml ps
          
          echo "📋 Service URLs:"
          echo "  - API: http://$(hostname -I | awk '{print $1}'):3001"
          echo "  - MinIO Console: http://$(hostname -I | awk '{print $1}'):9001"
          
          # Cleanup old images (keep last 3)
          echo "🧹 Cleaning up old images..."
          docker images "${IMAGE_NAME}" --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | \
            tail -n +2 | sort -k2 -r | tail -n +4 | awk '{print $1}' | xargs -r docker rmi || true
          
    - name: 📤 Copy deployment files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "docker-compose.production.yml,.env.production,nginx/"
        target: "/var/www/toeicai/ToeicBoost_BE/"
        
    - name: ✅ Success notification
      if: success()
      run: |
        echo "🎉 Docker deployment completed successfully!"
        echo "📊 Deployment Summary:"
        echo "  - Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "  - Server: ${{ secrets.SERVER_HOST }}"
        echo "  - Status: ✅ SUCCESS"
        
    - name: ❌ Failure notification
      if: failure()
      run: |
        echo "❌ Docker deployment failed!"
        echo "Please check the logs above for details."