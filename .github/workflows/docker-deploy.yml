name: Docker Production Deploy (DISABLED)

on:
  # Disabled - use simple-deploy.yml instead  
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy (workflow disabled)'
        required: false
        default: 'false'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔍 Lint code
      run: npm run lint
      
    - name: 🧪 Run tests
      run: npm run test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        DB_DATABASE: test_db
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        
    - name: 🏗️ Build application
      run: npm run build

  # Build Docker Image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: 🔑 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 📋 Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=sha,prefix={{date 'YYYYMMDD'}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 🏗️ Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        
    - name: 🔍 Verify image push
      run: |
        echo "✅ Image pushed successfully:"
        echo "${{ steps.meta.outputs.tags }}"
        
    - name: 🔍 Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'  # Don't fail build on vulnerabilities
      continue-on-error: true
        
    - name: 📤 Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('trivy-results.sarif') != ''
      with:
        sarif_file: 'trivy-results.sarif'

  # Deploy to Production
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    environment: production
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Check required secrets
      run: |
        if [ -z "${{ secrets.SERVER_HOST }}" ]; then
          echo "❌ SERVER_HOST secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.SERVER_USER }}" ]; then
          echo "❌ SERVER_USER secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
          echo "❌ SERVER_SSH_KEY secret is not set"
          exit 1
        fi
        echo "✅ All required secrets are configured"
      
    - name: � Copy deployment files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "docker-compose.production.yml,.env.production,nginx/,redis/,scripts/"
        target: "/var/www/toeicai/ToeicBoost_BE/"
        
    - name: �🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        sync: true
        script: |
          echo "🚀 STARTING DOCKER DEPLOYMENT..."
          
          # Check Docker installation
          echo "🔍 Checking Docker installation..."
          docker --version || (echo "❌ Docker not installed" && exit 1)
          
          # Check Docker Compose (try both versions)
          if command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE="docker-compose"
            echo "✅ Using docker-compose: $(docker-compose --version)"
          elif docker compose version &> /dev/null; then
            DOCKER_COMPOSE="docker compose"
            echo "✅ Using docker compose: $(docker compose version)"
          else
            echo "❌ Docker Compose not installed"
            exit 1
          fi
          
          # Set variables
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG="main-${{ github.sha }}"
          
          echo "🏷️ Using image tag: ${IMAGE_TAG}"
          
          # Create project directory
          sudo mkdir -p "$PROJECT_DIR"
          sudo chown -R $USER:$USER /var/www/toeicai
          cd "$PROJECT_DIR"
          
          echo "📁 Working in: $(pwd)"
          
          # Login to GitHub Container Registry
          echo "🔑 Logging into GitHub Container Registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest image
          echo "📥 Pulling latest Docker image..."
          docker pull "${IMAGE_NAME}:${IMAGE_TAG}"
          
          # Stop existing containers gracefully
          echo "🛑 Stopping existing containers..."
          if $DOCKER_COMPOSE -f docker-compose.production.yml ps -q | grep -q .; then
            $DOCKER_COMPOSE -f docker-compose.production.yml down --timeout 30
          else
            echo "No existing containers found"
          fi
          
          # Clean up unused images only (safer than system prune)
          echo "🧹 Cleaning up unused Docker images..."
          docker image prune -f
          
          # Set environment variables for docker-compose
          export DOCKER_REGISTRY="${{ env.REGISTRY }}"
          export IMAGE_TAG="${IMAGE_TAG}"
          export COMPOSE_PROJECT_NAME="toeicai"
          
          echo "🔧 Environment variables:"
          echo "  - DOCKER_REGISTRY: ${DOCKER_REGISTRY}"
          echo "  - IMAGE_TAG: ${IMAGE_TAG}"
          echo "  - COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME}"
          
          # Copy deployment files if not exist
          if [ ! -f "docker-compose.production.yml" ]; then
            echo "❌ Docker compose file not found after upload"
            exit 1
          fi
          
          # Start services
          echo "🚀 Starting services with Docker Compose..."
          $DOCKER_COMPOSE -f docker-compose.production.yml up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to be healthy..."
          timeout=300  # 5 minutes
          elapsed=0
          
          while [ $elapsed -lt $timeout ]; do
            # Check if containers are running
            running_containers=$($DOCKER_COMPOSE -f docker-compose.production.yml ps --services --filter "status=running" | wc -l)
            total_containers=$($DOCKER_COMPOSE -f docker-compose.production.yml ps --services | wc -l)
            
            echo "⏳ Containers running: $running_containers/$total_containers ($elapsed/$timeout seconds)"
            
            # Check if all containers are running
            if [ "$running_containers" -eq "$total_containers" ] && [ "$total_containers" -gt 0 ]; then
              # Additional check for healthy containers (if healthcheck is defined)
              healthy_check=$($DOCKER_COMPOSE -f docker-compose.production.yml ps | grep -c "Up (healthy)" || echo "0")
              if [ "$healthy_check" -gt 0 ]; then
                echo "✅ Services are healthy!"
                break
              else
                echo "⏳ Services running but waiting for health checks..."
              fi
            fi
            
            sleep 10
            elapsed=$((elapsed + 10))
          done
          
          if [ $elapsed -ge $timeout ]; then
            echo "❌ Services failed to become healthy within timeout"
            echo "📋 Container status:"
            $DOCKER_COMPOSE -f docker-compose.production.yml ps
            echo "📋 Container logs:"
            $DOCKER_COMPOSE -f docker-compose.production.yml logs --tail=50
            exit 1
          fi
          
          # Final health check
          echo "🏥 Performing final health check..."
          
          # Check if API is responding
          for i in {1..10}; do
            if curl -s --connect-timeout 5 --max-time 10 http://localhost:3001/health >/dev/null 2>&1; then
              echo "✅ API health check passed!"
              break
            elif [ $i -eq 10 ]; then
              echo "❌ API health check failed after 10 attempts"
              echo "📋 API container logs:"
              $DOCKER_COMPOSE -f docker-compose.production.yml logs api --tail=50
              exit 1
            else
              echo "⏳ API health check attempt $i/10..."
              sleep 5
            fi
          done
          
          # Show final status
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "📊 Final status:"
          $DOCKER_COMPOSE -f docker-compose.production.yml ps
          
          # Cleanup old images (keep last 5 versions for rollback)
          echo "🧹 Cleaning up old images (keeping last 5 for rollback)..."
          docker images "${IMAGE_NAME}" --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | \
            grep -E "main-[a-f0-9]{7,}" | \
            tail -n +2 | sort -k2 -r | tail -n +6 | awk '{print $1}' | xargs -r docker rmi || true
          
          echo "📋 Available images for rollback:"
          docker images "${IMAGE_NAME}" --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | head -6
          
    - name: ✅ Success notification
      if: success()
      run: |
        echo "🎉 Docker deployment completed successfully!"
        echo "📊 Deployment Summary:"
        echo "  - Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
        echo "  - Server: ${{ secrets.SERVER_HOST }}"
        echo "  - Status: ✅ SUCCESS"
        
    - name: ❌ Failure notification
      if: failure()
      run: |
        echo "❌ Docker deployment failed!"
        echo "Please check the logs above for details."