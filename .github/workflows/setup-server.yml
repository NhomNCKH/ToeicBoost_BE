name: Setup Server Environment

on:
  workflow_dispatch: # Manual trigger only

jobs:
  setup:
    name: Setup Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔧 Setup Server Environment
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        script: |
          set -e
          echo "🔧 Setting up server environment..."
          
          # Update system
          echo "📦 Updating system packages..."
          sudo apt update
          
          # Install Node.js 20 if not exists
          if ! command -v node >/dev/null 2>&1; then
            echo "📦 Installing Node.js 20..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          
          echo "✅ Node.js version: $(node --version)"
          echo "✅ npm version: $(npm --version)"
          
          # Install Git if not exists
          if ! command -v git >/dev/null 2>&1; then
            echo "📦 Installing Git..."
            sudo apt install -y git
          fi
          
          echo "✅ Git version: $(git --version)"
          
          # Create project directory
          echo "📁 Creating project directory..."
          sudo mkdir -p /var/www/toeicai
          sudo chown -R $USER:$USER /var/www/toeicai
          
          # Setup GitHub SSH if not exists
          if [ ! -f ~/.ssh/github_deploy ]; then
            echo "🔑 GitHub SSH key not found - please run setup script first"
            exit 1
          fi
          
          # Test GitHub connection
          echo "🔍 Testing GitHub SSH connection..."
          ssh -T git@github.com 2>&1 || echo "GitHub SSH test completed"
          
          # Clone or update project
          cd /var/www/toeicai
          if [ -d "ToeicBoost_BE" ]; then
            echo "📋 Project exists, updating..."
            cd ToeicBoost_BE
            git remote set-url origin git@github.com:NhomNCKH/ToeicBoost_BE.git
            git fetch origin main
            git reset --hard origin/main
          else
            echo "📥 Cloning project..."
            git clone git@github.com:NhomNCKH/ToeicBoost_BE.git
            cd ToeicBoost_BE
          fi
          
          # Create production .env
          echo "🔧 Creating production environment file..."
          cat > .env << 'EOF'
          NODE_ENV=production
          APP_PORT=3001
          APP_NAME=toeic-ai-api
          API_PREFIX=api/v1
          
          # Database (adjust as needed)
          DB_HOST=localhost
          DB_PORT=5432
          DB_USERNAME=toeicai_user
          DB_PASSWORD=StrongPassword123!
          DB_DATABASE=toeicai
          DB_SYNCHRONIZE=false
          DB_LOGGING=false
          DB_SSL=false
          
          # Redis
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          REDIS_DB=0
          
          # JWT Secrets
          JWT_ACCESS_SECRET=prod-access-secret-change-me
          JWT_ACCESS_EXPIRATION=15m
          JWT_REFRESH_SECRET=prod-refresh-secret-change-me
          JWT_REFRESH_EXPIRATION=7d
          EOF
          
          # Install dependencies
          echo "📦 Installing dependencies..."
          npm ci --production=false
          
          # Build project
          echo "🏗️ Building project..."
          npm run build
          
          echo "🎉 Server setup completed successfully!"
          echo "✅ Project directory: /var/www/toeicai/ToeicBoost_BE"
          echo "✅ Environment file created"
          echo "✅ Dependencies installed"
          echo "✅ Project built successfully"