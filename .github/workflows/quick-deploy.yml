name: Quick Deploy Test

on:
  workflow_dispatch: # Manual trigger only

jobs:
  quick-deploy:
    name: Quick Deploy Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🚀 Quick Deploy
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 5m
        script: |
          echo "🚀 Quick deployment test..."
          
          # Check basic connectivity
          echo "✅ SSH connection works"
          echo "User: $(whoami)"
          echo "Directory: $(pwd)"
          
          # Navigate to project directory
          if [ -d "/var/www/toeicai/ToeicBoost_BE" ]; then
            cd /var/www/toeicai/ToeicBoost_BE
            echo "✅ Project directory exists"
          else
            echo "Creating project directory..."
            mkdir -p /var/www/toeicai
            cd /var/www/toeicai
            
            # Clone project
            echo "Cloning project..."
            git clone git@github.com:NhomNCKH/ToeicBoost_BE.git || {
              echo "❌ Git clone failed - trying HTTPS..."
              git clone https://github.com/NhomNCKH/ToeicBoost_BE.git
            }
            cd ToeicBoost_BE
          fi
          
          # Quick git update
          echo "Updating code..."
          git pull origin main || echo "Git pull failed, continuing..."
          
          # Check if Node.js is available
          if command -v node >/dev/null 2>&1; then
            echo "✅ Node.js available: $(node --version)"
          else
            echo "❌ Node.js not found"
            exit 1
          fi
          
          # Quick npm install
          echo "Installing dependencies..."
          npm install --production || {
            echo "❌ npm install failed"
            exit 1
          }
          
          # Build
          echo "Building project..."
          npm run build || {
            echo "❌ Build failed"
            exit 1
          }
          
          # Kill existing process
          pkill -f "node.*dist/main" 2>/dev/null || echo "No existing process"
          
          # Start app
          echo "Starting application..."
          NODE_ENV=production nohup npm run start:prod > app.log 2>&1 &
          
          # Quick check
          sleep 5
          if pgrep -f "node.*dist/main" > /dev/null; then
            echo "✅ Application started successfully"
          else
            echo "❌ Application failed to start"
            tail -10 app.log
            exit 1
          fi
          
          echo "🎉 Quick deployment completed!"