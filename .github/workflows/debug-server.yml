name: Debug Server Status

on:
  workflow_dispatch: # Manual trigger only

jobs:
  debug:
    name: Debug Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Debug server status
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          echo "🔍 DEBUGGING SERVER STATUS..."
          echo "================================"
          
          # Navigate to project directory
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Check if we're in the right directory
          echo "📁 Current directory:"
          pwd
          
          # Check git status
          echo ""
          echo "📋 Git status:"
          git status --porcelain
          git log --oneline -5
          
          # Check Node.js processes
          echo ""
          echo "🔍 Node.js processes:"
          ps aux | grep -E "(node|npm)" | grep -v grep || echo "No Node.js processes found"
          
          # Check port 3001 usage
          echo ""
          echo "🔍 Port 3001 status:"
          netstat -tuln | grep 3001 || echo "Port 3001 not in use"
          lsof -i :3001 || echo "No processes using port 3001"
          
          # Check application logs
          echo ""
          echo "📋 Application logs (last 50 lines):"
          if [ -f app.log ]; then
              echo "--- app.log ---"
              tail -50 app.log
          else
              echo "app.log not found"
          fi
          
          # Check npm logs
          echo ""
          echo "📋 NPM logs:"
          if [ -f npm-debug.log ]; then
              echo "--- npm-debug.log ---"
              tail -20 npm-debug.log
          else
              echo "npm-debug.log not found"
          fi
          
          # Check system resources
          echo ""
          echo "💾 System resources:"
          echo "Memory:"
          free -h
          echo "Disk:"
          df -h /var/www/toeicai/ToeicBoost_BE
          
          # Check environment variables
          echo ""
          echo "🌍 Environment variables:"
          echo "NODE_ENV: $NODE_ENV"
          
          # Check .env file
          echo ""
          echo "📄 .env file status:"
          if [ -f .env ]; then
              echo ".env file exists"
              echo "File size: $(ls -lh .env | awk '{print $5}')"
              echo "First few lines (safe content only):"
              head -5 .env | grep -E "^(NODE_ENV|APP_PORT|APP_NAME|API_PREFIX)" || echo "No safe environment variables found"
          else
              echo ".env file not found"
          fi
          
          # Check if dist directory exists and has content
          echo ""
          echo "📦 Build output:"
          if [ -d dist ]; then
              echo "dist directory exists"
              echo "Contents:"
              ls -la dist/
              if [ -f dist/main.js ]; then
                  echo "main.js exists in dist"
                  echo "Size: $(ls -lh dist/main.js | awk '{print $5}')"
                  echo "Last modified: $(ls -l dist/main.js | awk '{print $6, $7, $8}')"
              else
                  echo "main.js NOT found in dist"
              fi
          else
              echo "dist directory NOT found"
          fi
          
          # Check package.json scripts
          echo ""
          echo "📋 Package.json scripts:"
          if [ -f package.json ]; then
              echo "start:prod script:"
              grep -A 1 '"start:prod"' package.json || echo "start:prod script not found"
          fi
          
          # Try to manually test the build
          echo ""
          echo "🧪 Testing build process..."
          
          # Kill any existing processes
          echo "Stopping existing processes..."
          pkill -f "node.*dist/main.js" || true
          pkill -f "npm.*start:prod" || true
          sleep 3
          
          # Test npm run build
          echo "Testing npm run build..."
          if npm run build; then
              echo "✅ Build successful"
          else
              echo "❌ Build failed"
              exit 1
          fi
          
          # Test environment variables and database connection
          echo ""
          echo "🧪 Testing environment and database..."
          if node test-env.js; then
              echo "✅ Environment and database test passed"
          else
              echo "❌ Environment or database test failed"
          fi
          
          # Try to start manually with timeout
          echo ""
          echo "🚀 Testing manual start (30 second timeout)..."
          
          # Start in background and capture PID
          NODE_ENV=development timeout 30s npm run start:prod > test_app.log 2>&1 &
          START_PID=$!
          
          echo "Started with PID: $START_PID"
          sleep 15
          
          # Check if process is still running
          if ps -p $START_PID > /dev/null 2>&1; then
              echo "✅ Application is running"
              
              # Test endpoints
              echo "🧪 Testing endpoints..."
              
              echo "Testing / endpoint:"
              if curl -f -s -m 10 http://localhost:3001/ > test_health.json 2>&1; then
                  echo "✅ Health endpoint working"
                  echo "Response: $(cat test_health.json)"
              else
                  echo "❌ Health endpoint failed"
                  echo "Curl output: $(cat test_health.json 2>/dev/null || echo 'No output')"
              fi
              
              echo "Testing /health endpoint:"
              if curl -f -s -m 10 http://localhost:3001/health > test_health_detail.json 2>&1; then
                  echo "✅ Health detail endpoint working"
                  echo "Response: $(cat test_health_detail.json)"
              else
                  echo "❌ Health detail endpoint failed"
              fi
              
              echo "Testing /api/v1/docs endpoint:"
              if curl -f -s -m 10 http://localhost:3001/api/v1/docs > test_swagger.html 2>&1; then
                  echo "✅ Swagger endpoint working"
                  echo "Response size: $(wc -c < test_swagger.html) bytes"
              else
                  echo "❌ Swagger endpoint failed"
              fi
              
              # Kill the test process
              kill $START_PID 2>/dev/null || true
              sleep 2
              
          else
              echo "❌ Application failed to start or crashed"
              echo "Exit code: $?"
          fi
          
          # Show test logs
          echo ""
          echo "📋 Test application logs:"
          if [ -f test_app.log ]; then
              echo "--- test_app.log ---"
              cat test_app.log
          else
              echo "No test logs found"
          fi
          
          # Final cleanup
          pkill -f "node.*dist/main.js" || true
          pkill -f "npm.*start:prod" || true
          
          echo ""
          echo "🔍 Debug completed!"