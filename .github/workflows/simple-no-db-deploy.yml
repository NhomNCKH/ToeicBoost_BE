name: Simple No-DB Deploy

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    name: Simple Deploy Without Database
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🚀 Deploy Simple Version
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 15m
        debug: true
        script: |
          set -e
          echo "🚀 Starting simple deployment without database..."
          
          # Setup project directory
          sudo mkdir -p /var/www/toeicai || mkdir -p /var/www/toeicai
          sudo chown -R $USER:$USER /var/www/toeicai 2>/dev/null || chown -R $USER:$USER /var/www/toeicai 2>/dev/null || echo "Chown failed, continuing..."
          cd /var/www/toeicai
          
          # Clone or update project
          if [ -d "ToeicBoost_BE" ]; then
            echo "Project exists, updating..."
            cd ToeicBoost_BE
            git pull origin main || echo "Git pull failed, continuing..."
          else
            echo "Cloning project..."
            git clone https://github.com/NhomNCKH/ToeicBoost_BE.git
            cd ToeicBoost_BE
          fi
          
          # Stop existing processes
          pkill -f "node.*dist/main" 2>/dev/null || echo "No process to kill"
          pkill -f "npm.*start:prod" 2>/dev/null || echo "No process to kill"
          sleep 3
          
          # Create minimal .env (no database)
          echo "🔧 Creating minimal .env..."
          cat > .env << 'EOF'
NODE_ENV=production
APP_PORT=3001
APP_NAME=toeic-ai-api
API_PREFIX=api/v1

# Disable database for testing
DB_SYNCHRONIZE=false
DB_LOGGING=false

# Minimal JWT config
JWT_ACCESS_SECRET=test-secret-123
JWT_ACCESS_EXPIRATION=15m
JWT_REFRESH_SECRET=test-refresh-123
JWT_REFRESH_EXPIRATION=7d
EOF
          
          # Install dependencies
          echo "📦 Installing dependencies..."
          npm install --production=false
          
          # Build project
          echo "🏗️ Building project..."
          npm run build
          
          # Check build output
          if [ -f "dist/main.js" ]; then
            echo "✅ Build successful - main.js exists"
          else
            echo "❌ Build failed - main.js not found"
            ls -la dist/ || echo "No dist directory"
            exit 1
          fi
          
          # Try to start with minimal config
          echo "🚀 Starting application with minimal config..."
          
          # Create a simple test server first
          cat > test-server.js << 'EOF'
const express = require('express');
const app = express();
const port = 3001;

app.get('/', (req, res) => {
  res.json({ message: 'Test server is running!', timestamp: new Date().toISOString() });
});

app.get('/health', (req, res) => {
  res.json({ status: 'OK', port: port });
});

app.listen(port, '0.0.0.0', () => {
  console.log(`Test server running on port ${port}`);
});
EOF
          
          # Start test server first
          echo "Testing with simple Express server..."
          nohup node test-server.js > test-server.log 2>&1 &
          TEST_PID=$!
          echo "Test server started with PID: $TEST_PID"
          
          # Wait for test server
          sleep 5
          
          # Test the simple server
          if curl -s http://localhost:3001/ | grep -q "Test server"; then
            echo "✅ Test server is working!"
            echo "Response:"
            curl -s http://localhost:3001/
            
            # Kill test server
            kill $TEST_PID 2>/dev/null || echo "Test server already stopped"
            sleep 2
            
            # Now try the real app
            echo "🚀 Starting real application..."
            nohup npm run start:prod > app.log 2>&1 &
            APP_PID=$!
            echo "Real app started with PID: $APP_PID"
            
            # Extended wait for real app
            for i in {1..20}; do
              echo "Checking real app... ($i/20)"
              
              if ! kill -0 $APP_PID 2>/dev/null; then
                echo "❌ Real app process died"
                echo "App logs:"
                cat app.log 2>/dev/null || echo "No logs"
                exit 1
              fi
              
              if curl -s --connect-timeout 5 http://localhost:3001/ >/dev/null 2>&1; then
                echo "✅ Real application is responding!"
                echo "Response:"
                curl -s http://localhost:3001/ | head -5
                break
              fi
              
              if [ $i -eq 20 ]; then
                echo "❌ Real app not responding after 100 seconds"
                echo "App logs:"
                cat app.log 2>/dev/null || echo "No logs"
                echo "Process status:"
                ps aux | grep -E "(node|npm)" | grep -v grep || echo "No processes"
                exit 1
              fi
              
              sleep 5
            done
            
          else
            echo "❌ Even test server failed"
            echo "Test server logs:"
            cat test-server.log 2>/dev/null || echo "No test logs"
            kill $TEST_PID 2>/dev/null || echo "Test server cleanup"
            exit 1
          fi
          
          echo "🎉 Deployment successful!"
          echo "✅ Application is running on port 3001"