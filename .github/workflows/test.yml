name: Test & Lint

on:
  push:
    branches: [ beta, main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toeicai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧹 Lint code
      run: npm run lint
      
    - name: 🎨 Check code formatting
      run: npm run format -- --check
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🧪 Run tests
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        DB_DATABASE: toeicai_test
        JWT_ACCESS_SECRET: test-access-secret
        JWT_REFRESH_SECRET: test-refresh-secret
        JWT_ACCESS_EXPIRATION: 15m
        JWT_REFRESH_EXPIRATION: 7d
      run: npm test
      
    - name: 📊 Test Results
      if: success()
      run: |
        echo "✅ All tests passed!"
        echo "✅ Code linting passed!"
        echo "✅ Build successful!"