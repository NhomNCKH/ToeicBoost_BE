name: Force Deploy

on:
  workflow_dispatch: # Manual trigger
    inputs:
      force:
        description: 'Force deployment'
        required: true
        default: 'yes'

jobs:
  deploy:
    name: Force Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy using different SSH method
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        timeout: 300s
        command_timeout: 300s
        script: |
          #!/bin/bash
          set -x
          
          echo "=== FORCE DEPLOYMENT STARTED ==="
          
          # Navigate to project
          if ! cd /var/www/toeicai/ToeicBoost_BE; then
            echo "ERROR: Cannot access project directory"
            exit 1
          fi
          
          echo "Current directory: $(pwd)"
          
          # Kill all node processes
          echo "Killing existing processes..."
          sudo pkill -f node || true
          sudo pkill -f npm || true
          sleep 5
          
          # Force kill anything on port 3001
          sudo lsof -ti:3001 | xargs sudo kill -9 || true
          sleep 2
          
          # Update code
          echo "Updating code..."
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          
          echo "Latest commit: $(git log --oneline -1)"
          
          # Setup environment
          echo "Setting up environment..."
          if [ ! -f .env ]; then
            cp .env.example .env
            sed -i 's/DB_HOST=localhost/DB_HOST=144.91.104.237/' .env
            sed -i 's/DB_PORT=5432/DB_PORT=5433/' .env
            sed -i 's/DB_USERNAME=postgres/DB_USERNAME=toeicai_user/' .env
            sed -i 's/DB_PASSWORD=postgres/DB_PASSWORD=StrongPassword123!/' .env
            sed -i 's/DB_DATABASE=toeic_ai/DB_DATABASE=toeicai/' .env
            echo "Environment file created"
          else
            echo "Environment file exists"
          fi
          
          # Install dependencies
          echo "Installing dependencies..."
          npm cache clean --force || true
          rm -rf node_modules package-lock.json || true
          npm install
          
          # Build
          echo "Building project..."
          rm -rf dist || true
          npm run build
          
          # Verify build
          if [ ! -f dist/main.js ]; then
            echo "ERROR: Build failed - main.js not found"
            ls -la dist/ || echo "No dist directory"
            exit 1
          fi
          
          echo "Build successful - main.js size: $(ls -lh dist/main.js | awk '{print $5}')"
          
          # Test environment
          echo "Testing environment..."
          if ! node test-env.js; then
            echo "ERROR: Environment test failed"
            exit 1
          fi
          
          # Start application
          echo "Starting application..."
          export NODE_ENV=development
          nohup npm run start:prod > app.log 2>&1 &
          APP_PID=$!
          
          echo "Application started with PID: $APP_PID"
          
          # Wait for startup
          echo "Waiting for application startup..."
          sleep 20
          
          # Check if process is running
          if ! ps -p $APP_PID > /dev/null 2>&1; then
            echo "ERROR: Application process died"
            echo "=== APPLICATION LOGS ==="
            tail -50 app.log || echo "No logs found"
            exit 1
          fi
          
          echo "Process is running"
          
          # Wait for port
          echo "Waiting for port 3001..."
          for i in {1..60}; do
            if netstat -tuln | grep :3001 > /dev/null; then
              echo "Port 3001 is ready"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Port 3001 not ready after 60 seconds"
              echo "=== APPLICATION LOGS ==="
              tail -50 app.log || echo "No logs found"
              exit 1
            fi
            sleep 1
          done
          
          # Test health endpoint
          echo "Testing health endpoint..."
          for i in {1..10}; do
            if curl -f -s -m 10 http://localhost:3001/ > health_response.json; then
              echo "SUCCESS: Health endpoint is working"
              echo "Response: $(cat health_response.json)"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "ERROR: Health endpoint failed after 10 attempts"
              echo "=== APPLICATION LOGS ==="
              tail -50 app.log || echo "No logs found"
              exit 1
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          
          # Test other endpoints
          echo "Testing other endpoints..."
          
          if curl -f -s -m 10 http://localhost:3001/health > /dev/null; then
            echo "✅ Health detail endpoint working"
          else
            echo "⚠️ Health detail endpoint failed"
          fi
          
          if curl -f -s -m 10 http://localhost:3001/api/v1/docs > /dev/null; then
            echo "✅ Swagger docs working"
          else
            echo "⚠️ Swagger docs failed"
          fi
          
          echo ""
          echo "=== DEPLOYMENT SUCCESSFUL ==="
          echo "🌐 Health: http://144.91.104.237:3001/"
          echo "🏥 Health Detail: http://144.91.104.237:3001/health"
          echo "📚 Swagger: http://144.91.104.237:3001/api/v1/docs"
          echo "🔐 Auth API: http://144.91.104.237:3001/api/v1/auth/*"
          echo ""
          echo "Application PID: $APP_PID"
          echo "Log file: app.log"
          echo "=== DEPLOYMENT COMPLETE ==="
          
    - name: ✅ Deployment Success
      if: success()
      run: |
        echo "🎉 DEPLOYMENT SUCCESSFUL!"
        echo "API is now running at http://${{ secrets.SERVER_HOST }}:3001"
        echo "Swagger docs: http://${{ secrets.SERVER_HOST }}:3001/api/v1/docs"
        
    - name: ❌ Deployment Failed  
      if: failure()
      run: |
        echo "💥 DEPLOYMENT FAILED!"
        echo "Please check the logs above for detailed error information."