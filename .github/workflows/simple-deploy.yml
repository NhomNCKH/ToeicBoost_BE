name: Simple Docker Deploy (DISABLED)

on:
  # Disabled - use deploy-final.yml instead
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy (workflow disabled)'
        required: false
        default: 'false'

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📤 Upload source code to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "."
        target: "/tmp/toeicai-deploy-${{ github.sha }}"
        rm: true
        
    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        sync: true
        script: |
          echo "🚀 STARTING DOCKER DEPLOYMENT..."
          
          # Variables
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          TEMP_DIR="/tmp/toeicai-deploy-${{ github.sha }}"
          IMAGE_TAG="toeicai-api:${{ github.sha }}"
          
          # Check Docker
          docker --version || (echo "❌ Docker not installed" && exit 1)
          
          # Check Docker Compose
          if command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE="docker-compose"
            echo "✅ Using docker-compose: $(docker-compose --version)"
          elif docker compose version &> /dev/null; then
            DOCKER_COMPOSE="docker compose"
            echo "✅ Using docker compose: $(docker compose version)"
          else
            echo "❌ Docker Compose not installed" && exit 1
          fi
          
          # Create project directory
          sudo mkdir -p "$PROJECT_DIR"
          sudo chown -R $USER:$USER /var/www/toeicai
          
          # Stop ALL existing processes and containers
          echo "🛑 Stopping ALL existing processes and containers..."
          
          # Stop any existing Node.js processes
          if [ -f "$PROJECT_DIR/app.pid" ]; then
            OLD_PID=$(cat "$PROJECT_DIR/app.pid")
            if kill -0 $OLD_PID 2>/dev/null; then
              echo "Stopping Node.js process $OLD_PID..."
              kill $OLD_PID 2>/dev/null || true
              sleep 3
            fi
            rm -f "$PROJECT_DIR/app.pid"
          fi
          
          # Kill ALL processes using ports 3001, 5432, 6379, 9000, 9001
          for port in 3001 5432 6379 9000 9001; do
            PORT_PIDS=$(lsof -ti:$port 2>/dev/null || true)
            if [ -n "$PORT_PIDS" ]; then
              echo "Killing processes on port $port: $PORT_PIDS"
              echo "$PORT_PIDS" | xargs -r kill -9 2>/dev/null || true
            fi
          done
          
          # Stop ALL Docker containers (not just project ones)
          echo "🛑 Stopping ALL Docker containers..."
          docker stop $(docker ps -q) 2>/dev/null || true
          
          # Remove containers with conflicting names
          echo "🗑️ Removing conflicting containers..."
          docker rm -f toeic_ai_postgres_prod toeic_ai_redis_prod toeic_ai_minio_prod toeic_ai_nginx_prod toeic_ai_api_prod 2>/dev/null || true
          docker rm -f toeicai_postgres_prod toeicai_redis_prod toeicai_minio_prod toeicai_nginx_prod toeicai_api_prod 2>/dev/null || true
          
          # Remove networks
          docker network rm toeicai_toeic_network toeic_network 2>/dev/null || true
          
          # Wait for cleanup
          sleep 5
          
          # Backup current deployment
          if [ -d "$PROJECT_DIR" ]; then
            echo "💾 Creating backup..."
            rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
            mv "$PROJECT_DIR" "$PROJECT_DIR.backup" 2>/dev/null || true
          fi
          
          # Move new code to project directory
          echo "📁 Installing new code..."
          mv "$TEMP_DIR" "$PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Verify required files
          if [ ! -f "Dockerfile" ]; then
            echo "❌ Dockerfile not found"
            ls -la
            exit 1
          fi
          
          if [ ! -f "docker-compose.simple.yml" ]; then
            echo "❌ docker-compose.simple.yml not found"
            ls -la
            exit 1
          fi
          
          # Setup environment file
          if [ ! -f ".env.production" ]; then
            echo "❌ .env.production not found"
            ls -la
            exit 1
          fi
          
          # Copy .env.production to .env for container
          cp .env.production .env
          
          echo "✅ Required files found:"
          ls -la Dockerfile docker-compose.simple.yml .env.production .env
          
          # Build Docker image locally
          echo "🏗️ Building Docker image: $IMAGE_TAG"
          docker build -t "$IMAGE_TAG" .
          
          # Set environment variables
          export IMAGE_TAG="${{ github.sha }}"
          export COMPOSE_PROJECT_NAME="toeicai"
          
          echo "🔧 Environment variables:"
          echo "  - IMAGE_TAG: $IMAGE_TAG"
          echo "  - COMPOSE_PROJECT_NAME: $COMPOSE_PROJECT_NAME"
          
          # Start API service only (connect to existing PostgreSQL)
          echo "🚀 Starting API service..."
          $DOCKER_COMPOSE -f docker-compose.simple.yml up -d
          
          # Wait for services
          echo "⏳ Waiting for services to start..."
          sleep 10
          
          # Check container status immediately
          echo "📊 Initial container status:"
          $DOCKER_COMPOSE -f docker-compose.simple.yml ps
          
          # Check if container is running
          if ! docker ps | grep -q "toeicai_api"; then
            echo "❌ Container failed to start, checking logs..."
            docker logs toeicai_api 2>/dev/null || echo "No logs available"
            
            echo "📋 Container inspect:"
            docker inspect toeicai_api 2>/dev/null | grep -A 5 -B 5 "State\|Error" || echo "Cannot inspect container"
          fi
          
          sleep 20
          
          # Check containers
          echo "📊 Container status:"
          $DOCKER_COMPOSE -f docker-compose.simple.yml ps
          
          # Health check
          echo "🏥 Performing health check..."
          for i in {1..10}; do
            if curl -s --connect-timeout 5 --max-time 10 http://localhost:3001/health >/dev/null 2>&1; then
              echo "✅ API health check passed!"
              
              # Show final status
              echo "🎉 DEPLOYMENT SUCCESSFUL!"
              echo "📊 Final status:"
              $DOCKER_COMPOSE -f docker-compose.simple.yml ps
              
              echo "📋 Service URLs:"
              echo "  - API: http://$(hostname -I | awk '{print $1}'):3001"
              echo "  - Health: http://$(hostname -I | awk '{print $1}'):3001/health"
              
              # Cleanup old backup
              rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
              
              # Cleanup old images (keep last 3)
              echo "🧹 Cleaning up old images..."
              docker images "toeicai-api" --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | \
                tail -n +2 | sort -k2 -r | tail -n +4 | awk '{print $1}' | xargs -r docker rmi || true
              
              exit 0
            elif [ $i -eq 10 ]; then
              echo "❌ API health check failed after 10 attempts"
              echo "📋 Container logs:"
              $DOCKER_COMPOSE -f docker-compose.simple.yml logs api --tail=50 || docker logs toeicai_api --tail=50 2>/dev/null || echo "Cannot get logs"
              
              # Rollback
              if [ -d "$PROJECT_DIR.backup" ]; then
                echo "🔄 Rolling back to previous version..."
                $DOCKER_COMPOSE -f docker-compose.simple.yml down
                cd ..
                rm -rf "$PROJECT_DIR"
                mv "$PROJECT_DIR.backup" "$PROJECT_DIR"
                cd "$PROJECT_DIR"
                if [ -f "docker-compose.simple.yml" ]; then
                  $DOCKER_COMPOSE -f docker-compose.simple.yml up -d
                  echo "✅ Rollback completed"
                fi
              fi
              exit 1
            else
              echo "⏳ API health check attempt $i/10..."
              sleep 5
            fi
          done
          
    - name: ✅ Success
      if: success()
      run: |
        echo "🎉 Docker deployment completed successfully!"
        echo "📊 Deployment Summary:"
        echo "  - Method: Direct upload + build on server"
        echo "  - Image: toeicai-api:${{ github.sha }}"
        echo "  - Server: ${{ secrets.SERVER_HOST }}"
        echo "  - Status: ✅ SUCCESS"
      
    - name: ❌ Failure  
      if: failure()
      run: |
        echo "❌ Docker deployment failed!"
        echo "Please check the logs above for details."