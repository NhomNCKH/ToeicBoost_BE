name: Simple Deploy

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    name: Simple Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Simple Deployment
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 5m
        script: |
          echo "🚀 Starting simple deployment..."
          
          # Navigate to project
          cd /var/www/toeicai/ToeicBoost_BE || {
            echo "❌ Project directory not found"
            echo "Please run 'Setup Server Environment' workflow first"
            exit 1
          }
          
          # Stop existing app
          echo "🔄 Stopping existing application..."
          pkill -f "npm.*start:prod" 2>/dev/null || echo "No existing process"
          pkill -f "node.*dist/main" 2>/dev/null || echo "No existing node process"
          sleep 3
          
          # Update code
          echo "📥 Updating code..."
          git fetch origin main
          git reset --hard origin/main
          
          # Quick build
          echo "🏗️ Building..."
          npm run build
          
          # Start app
          echo "🚀 Starting application..."
          nohup npm run start:prod > app.log 2>&1 &
          
          # Quick check
          sleep 10
          if pgrep -f "node.*dist/main" > /dev/null; then
            echo "✅ Application started successfully"
          else
            echo "❌ Application failed to start"
            echo "Recent logs:"
            tail -10 app.log 2>/dev/null || echo "No logs"
            exit 1
          fi
          
          echo "🎉 Simple deployment completed!"