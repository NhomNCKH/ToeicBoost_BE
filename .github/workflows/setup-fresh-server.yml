name: Setup Fresh Server

on:
  workflow_dispatch: # Manual trigger only

jobs:
  setup:
    name: Setup Fresh Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔧 Fresh Server Setup
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        script: |
          set -e
          echo "🔧 Setting up fresh server..."
          
          # Update system
          echo "📦 Updating system..."
          sudo apt update
          
          # Install Node.js 20 if not exists
          if ! command -v node >/dev/null 2>&1; then
            echo "📦 Installing Node.js 20..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          else
            echo "✅ Node.js already installed: $(node --version)"
          fi
          
          # Install Git if not exists
          if ! command -v git >/dev/null 2>&1; then
            echo "📦 Installing Git..."
            sudo apt install -y git
          else
            echo "✅ Git already installed: $(git --version)"
          fi
          
          # Install curl if not exists
          if ! command -v curl >/dev/null 2>&1; then
            echo "📦 Installing curl..."
            sudo apt install -y curl
          else
            echo "✅ curl already installed"
          fi
          
          # Create project directory with proper permissions
          echo "📁 Setting up project directory..."
          sudo mkdir -p /var/www/toeicai
          sudo chown -R $USER:$USER /var/www/toeicai
          chmod 755 /var/www/toeicai
          
          # Setup GitHub SSH key if missing
          if [ ! -f ~/.ssh/github_deploy ]; then
            echo "🔑 Setting up GitHub SSH key..."
            
            # Create SSH directory
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            
