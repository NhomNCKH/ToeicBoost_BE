            chmod 600 ~/.ssh/github_deploy
            
            # Create SSH config
            cat > ~/.ssh/config << 'EOF'
Host github.com
    HostName github.com
    User git
    IdentityFile ~/.ssh/github_deploy
    StrictHostKeyChecking no
EOF
            chmod 600 ~/.ssh/config
            
            echo "✅ GitHub SSH key setup completed"
          else
            echo "✅ GitHub SSH key already exists"
          fi
          
          # Test GitHub connection
          echo "🔍 Testing GitHub connection..."
          ssh -T git@github.com 2>&1 | head -3 || echo "GitHub SSH test completed"
          
          # Clone project
          cd /var/www/toeicai
          if [ ! -d "ToeicBoost_BE" ]; then
            echo "📥 Cloning project..."
            git clone git@github.com:NhomNCKH/ToeicBoost_BE.git || {
              echo "SSH clone failed, trying HTTPS..."
              git clone https://github.com/NhomNCKH/ToeicBoost_BE.git
            }
          else
            echo "✅ Project already exists"
          fi
          
          cd ToeicBoost_BE
          
          # Create production .env
          echo "🔧 Creating production .env..."
          cat > .env << 'EOF'
NODE_ENV=production
APP_PORT=3001
APP_NAME=toeic-ai-api
API_PREFIX=api/v1

# Database
DB_HOST=localhost
DB_PORT=5432
DB_USERNAME=toeicai_user
DB_PASSWORD=StrongPassword123!
DB_DATABASE=toeicai
DB_SYNCHRONIZE=false
DB_LOGGING=false
DB_SSL=false

# Redis
REDIS_HOST=localhost
REDIS_PORT=6379
REDIS_PASSWORD=
REDIS_DB=0

# JWT
JWT_ACCESS_SECRET=prod-access-secret-$(date +%s)
JWT_ACCESS_EXPIRATION=15m
JWT_REFRESH_SECRET=prod-refresh-secret-$(date +%s)
JWT_REFRESH_EXPIRATION=7d
EOF
          
          # Install dependencies
          echo "📦 Installing dependencies..."
          npm install --production=false
          
          # Build project
          echo "🏗️ Building project..."
          npm run build
          
          echo "🎉 Fresh server setup completed!"
          echo "✅ Node.js: $(node --version)"
          echo "✅ npm: $(npm --version)"
          echo "✅ Git: $(git --version)"
          echo "✅ Project directory: /var/www/toeicai/ToeicBoost_BE"
          echo "✅ Dependencies installed"
          echo "✅ Project built"