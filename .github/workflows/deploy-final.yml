name: Final Production Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📤 Upload code to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "."
        target: "/tmp/deploy-${{ github.sha }}"
        rm: true
        
    - name: � Stop existing processes
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        sync: true
        script: |
          echo "� Stopping processes on port 3001..."
          
          # Method 1: Find and kill processes gently
          PIDS=$(ps aux | grep -E "(node.*3001|:3001)" | grep -v grep | awk '{print $2}' || true)
          if [ -n "$PIDS" ]; then
            echo "Found processes: $PIDS"
            for pid in $PIDS; do
              echo "Killing process $pid..."
              kill $pid 2>/dev/null || true
            done
            sleep 2
          fi
          
          # Method 2: Use lsof to find port users
          PORT_PIDS=$(lsof -ti:3001 2>/dev/null || true)
          if [ -n "$PORT_PIDS" ]; then
            echo "Found processes on port 3001: $PORT_PIDS"
            for pid in $PORT_PIDS; do
              kill -9 $pid 2>/dev/null || true
            done
          fi
          
          echo "✅ Process cleanup completed"
          
    - name: 🐳 Stop Docker containers
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 3m
        sync: true
        script: |
          echo "🐳 Stopping Docker containers..."
          
          # Stop specific container first
          docker stop toeicai-api 2>/dev/null || true
          docker rm toeicai-api 2>/dev/null || true
          
          # Stop all containers if needed
          CONTAINERS=$(docker ps -q)
          if [ -n "$CONTAINERS" ]; then
            echo "Stopping containers: $CONTAINERS"
            docker stop $CONTAINERS 2>/dev/null || true
          fi
          
          # Remove stopped containers
          STOPPED=$(docker ps -aq)
          if [ -n "$STOPPED" ]; then
            echo "Removing containers: $STOPPED"
            docker rm $STOPPED 2>/dev/null || true
          fi
          
          # Clean networks
          docker network prune -f 2>/dev/null || true
          
          echo "✅ Docker cleanup completed"
          
    - name: 📁 Setup deployment directory
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        sync: true
        script: |
          echo "📁 Setting up deployment directory..."
          
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          TEMP_DIR="/tmp/deploy-${{ github.sha }}"
          
          # Create directories
          mkdir -p "$PROJECT_DIR"
          chown -R $USER:$USER /var/www/toeicai 2>/dev/null || true
          
          # Backup existing
          if [ -d "$PROJECT_DIR" ]; then
            rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
            mv "$PROJECT_DIR" "$PROJECT_DIR.backup" 2>/dev/null || true
            echo "✅ Backup created"
          fi
          
          # Move new code
          if [ ! -d "$TEMP_DIR" ]; then
            echo "❌ Source code not found at $TEMP_DIR"
            exit 1
          fi
          
          mv "$TEMP_DIR" "$PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Verify files
          if [ ! -f "Dockerfile" ]; then
            echo "❌ Dockerfile not found"
            ls -la
            exit 1
          fi
          
          if [ ! -f ".env.production" ]; then
            echo "❌ .env.production not found"
            ls -la
            exit 1
          fi
          
          # Create .env
          cp .env.production .env
          
          echo "✅ Deployment directory ready"
          echo "� Files:"
          ls -la Dockerfile .env.production .env
          
    - name: 🏗️ Build Docker image
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        sync: true
        script: |
          echo "🏗️ Building Docker image..."
          
          cd "/var/www/toeicai/ToeicBoost_BE"
          
          # Remove old image
          docker rmi toeicai-api:latest 2>/dev/null || true
          
          # Build new image
          if ! docker build -t toeicai-api:latest .; then
            echo "❌ Docker build failed"
            echo "📋 Build context:"
            ls -la
            exit 1
          fi
          
          echo "✅ Docker image built successfully"
          docker images | grep toeicai-api
          
    - name: 🚀 Start application
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 5m
        sync: true
        script: |
          echo "🚀 Starting application..."
          
          cd "/var/www/toeicai/ToeicBoost_BE"
          
          # Start container
          if ! docker run -d \
            --name toeicai-api \
            --restart unless-stopped \
            -p 3001:3001 \
            --env-file .env \
            toeicai-api:latest; then
            echo "❌ Container start failed"
            docker logs toeicai-api 2>/dev/null || true
            exit 1
          fi
          
          echo "✅ Container started"
          
          # Wait for startup
          echo "⏳ Waiting for application startup..."
          sleep 15
          
          # Check container
          if docker ps | grep -q "toeicai-api"; then
            echo "✅ Container is running"
            docker ps --filter "name=toeicai-api"
          else
            echo "❌ Container not running"
            docker ps -a --filter "name=toeicai-api"
            docker logs toeicai-api 2>/dev/null || true
            exit 1
          fi
          
    - name: 🏥 Health check and finalize
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 3m
        sync: true
        script: |
          echo "🏥 Performing health check..."
          
          # Health check loop
          for i in {1..12}; do
            if curl -s --connect-timeout 5 --max-time 10 http://localhost:3001/health >/dev/null 2>&1; then
              echo "✅ Health check passed!"
              
              # Show success info
              echo "🎉 DEPLOYMENT SUCCESSFUL!"
              echo "📊 Container status:"
              docker ps --filter "name=toeicai-api"
              
              echo "📋 Health response:"
              curl -s http://localhost:3001/health 2>/dev/null | head -200 || echo "Cannot get response"
              
              # Cleanup
              rm -rf "/var/www/toeicai/ToeicBoost_BE.backup" 2>/dev/null || true
              docker image prune -f 2>/dev/null || true
              
              echo "✅ Deployment completed successfully!"
              exit 0
            fi
            echo "⏳ Health check attempt $i/12..."
            sleep 5
          done
          
          # Health check failed
          echo "❌ Health check failed after 12 attempts"
          echo "📋 Container logs:"
          docker logs toeicai-api --tail=50 2>/dev/null || echo "Cannot get logs"
          
          echo "📋 Container status:"
          docker ps -a --filter "name=toeicai-api"
          
          # Rollback
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          if [ -d "$PROJECT_DIR.backup" ]; then
            echo "🔄 Rolling back..."
            docker stop toeicai-api 2>/dev/null || true
            docker rm toeicai-api 2>/dev/null || true
            cd ..
            rm -rf "$PROJECT_DIR"
            mv "$PROJECT_DIR.backup" "$PROJECT_DIR"
            echo "✅ Rollback completed"
          fi
          
          exit 1
          
    - name: ✅ Success
      if: success()
      run: |
        echo "🎉 Final deployment completed successfully!"
        echo "📊 API URL: http://${{ secrets.SERVER_HOST }}:3001"
        echo "📊 Health: http://${{ secrets.SERVER_HOST }}:3001/health"
        
    - name: ❌ Failure
      if: failure()
      run: |
        echo "❌ Final deployment failed!"
        echo "Check the logs above for details."