name: Final Production Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 📤 Upload code to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "."
        target: "/tmp/deploy-${{ github.sha }}"
        rm: true
        
    - name: 🚀 Deploy on server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 15m
        sync: true
        script: |
          echo "🚀 STARTING FINAL DEPLOYMENT..."
          
          # Variables
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          TEMP_DIR="/tmp/deploy-${{ github.sha }}"
          
          # Check Docker
          if ! docker --version; then
            echo "❌ Docker not installed"
            exit 1
          fi
          
          # Stop processes on port 3001 (ignore errors)
          echo "🛑 Stopping processes on port 3001..."
          pkill -f "node.*3001" 2>/dev/null || true
          pkill -f ":3001" 2>/dev/null || true
          lsof -ti:3001 | xargs -r kill -9 2>/dev/null || true
          
          # Stop Docker containers (ignore errors)
          echo "🛑 Stopping Docker containers..."
          docker stop $(docker ps -q) 2>/dev/null || true
          docker rm $(docker ps -aq) 2>/dev/null || true
          docker network prune -f 2>/dev/null || true
          
          # Wait for cleanup
          sleep 3
          
          # Backup and move new code
          echo "📁 Installing new code..."
          mkdir -p "$PROJECT_DIR"
          chown -R $USER:$USER /var/www/toeicai 2>/dev/null || true
          
          if [ -d "$PROJECT_DIR" ]; then
            rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
            mv "$PROJECT_DIR" "$PROJECT_DIR.backup" 2>/dev/null || true
          fi
          
          if [ ! -d "$TEMP_DIR" ]; then
            echo "❌ Source code not found at $TEMP_DIR"
            exit 1
          fi
          
          mv "$TEMP_DIR" "$PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # Verify files
          echo "✅ Verifying files..."
          if [ ! -f "Dockerfile" ]; then
            echo "❌ Dockerfile not found"
            ls -la
            exit 1
          fi
          
          if [ ! -f ".env.production" ]; then
            echo "❌ .env.production not found"
            ls -la
            exit 1
          fi
          
          # Create .env
          cp .env.production .env
          echo "✅ Environment file created"
          
          # Build image
          echo "🏗️ Building Docker image..."
          if ! docker build -t toeicai-api:latest .; then
            echo "❌ Docker build failed"
            exit 1
          fi
          
          echo "✅ Docker image built successfully"
          
          # Remove old container if exists
          docker stop toeicai-api 2>/dev/null || true
          docker rm toeicai-api 2>/dev/null || true
          
          # Run container
          echo "🚀 Starting container..."
          if ! docker run -d \
            --name toeicai-api \
            --restart unless-stopped \
            -p 3001:3001 \
            --env-file .env \
            toeicai-api:latest; then
            echo "❌ Container start failed"
            docker logs toeicai-api 2>/dev/null || true
            exit 1
          fi
          
          echo "✅ Container started"
          
          # Wait and check
          echo "⏳ Waiting for application to start..."
          sleep 20
          
          # Check container status
          if docker ps | grep -q "toeicai-api"; then
            echo "✅ Container is running"
          else
            echo "❌ Container not running"
            docker logs toeicai-api 2>/dev/null || true
            exit 1
          fi
          
          # Health check
          echo "🏥 Performing health check..."
          for i in {1..15}; do
            if curl -s --connect-timeout 5 --max-time 10 http://localhost:3001/health >/dev/null 2>&1; then
              echo "✅ Health check passed!"
              
              # Show final status
              echo "🎉 DEPLOYMENT SUCCESSFUL!"
              echo "📊 Container status:"
              docker ps --filter "name=toeicai-api"
              
              echo "📋 Health response:"
              curl -s http://localhost:3001/health 2>/dev/null || echo "Cannot get health response"
              
              # Cleanup
              rm -rf "$PROJECT_DIR.backup" 2>/dev/null || true
              docker image prune -f 2>/dev/null || true
              
              exit 0
            fi
            echo "⏳ Health check attempt $i/15..."
            sleep 4
          done
          
          echo "❌ Health check failed after 15 attempts"
          echo "📋 Container logs:"
          docker logs toeicai-api --tail=50 2>/dev/null || echo "Cannot get container logs"
          
          echo "📋 Container status:"
          docker ps -a --filter "name=toeicai-api"
          
          # Rollback
          if [ -d "$PROJECT_DIR.backup" ]; then
            echo "🔄 Rolling back..."
            docker stop toeicai-api 2>/dev/null || true
            docker rm toeicai-api 2>/dev/null || true
            cd ..
            rm -rf "$PROJECT_DIR"
            mv "$PROJECT_DIR.backup" "$PROJECT_DIR"
            echo "✅ Rollback completed"
          fi
          
          exit 1
          
    - name: ✅ Success
      if: success()
      run: |
        echo "🎉 Final deployment completed successfully!"
        echo "📊 API URL: http://${{ secrets.SERVER_HOST }}:3001"
        echo "📊 Health: http://${{ secrets.SERVER_HOST }}:3001/health"
        
    - name: ❌ Failure
      if: failure()
      run: |
        echo "❌ Final deployment failed!"
        echo "Check the logs above for details."