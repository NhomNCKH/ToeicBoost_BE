name: Step by Step Deploy

on:
  workflow_dispatch: # Manual trigger only

jobs:
  deploy:
    name: Step by Step Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🧹 Step 1 - Cleanup server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        script: |
          echo "🧹 CLEANUP STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Kill processes
          echo "Killing Node.js processes..."
          pkill -f node || true
          pkill -f npm || true
          sleep 3
          
          # Force kill port 3001
          lsof -ti:3001 | xargs kill -9 || true
          sleep 2
          
          # Clean logs
          rm -f app.log *.log || true
          
          echo "✅ Cleanup complete"
          
    - name: 📥 Step 2 - Update code
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 3m
        script: |
          echo "📥 UPDATE CODE STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Update git
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          
          echo "✅ Code updated to: $(git log --oneline -1)"
          
    - name: 🌍 Step 3 - Setup environment
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 1m
        script: |
          echo "🌍 ENVIRONMENT SETUP STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Create .env if missing
          if [ ! -f .env ]; then
            echo "Creating .env file..."
            cp .env.example .env
            
            # Update with production values
            sed -i 's/DB_HOST=localhost/DB_HOST=144.91.104.237/' .env
            sed -i 's/DB_PORT=5432/DB_PORT=5433/' .env
            sed -i 's/DB_USERNAME=postgres/DB_USERNAME=toeicai_user/' .env
            sed -i 's/DB_PASSWORD=postgres/DB_PASSWORD=StrongPassword123!/' .env
            sed -i 's/DB_DATABASE=toeic_ai/DB_DATABASE=toeicai/' .env
          fi
          
          echo "✅ Environment setup complete"
          
    - name: 📦 Step 4 - Install dependencies
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 5m
        script: |
          echo "📦 DEPENDENCIES STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Clean install
          rm -rf node_modules package-lock.json || true
          npm cache clean --force || true
          
          echo "Installing dependencies..."
          npm install
          
          echo "✅ Dependencies installed"
          
    - name: 🏗️ Step 5 - Build project
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 3m
        script: |
          echo "🏗️ BUILD STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Clean build
          rm -rf dist || true
          
          echo "Building project..."
          npm run build
          
          # Verify build
          if [ -f dist/main.js ]; then
            echo "✅ Build successful - main.js created"
            echo "Size: $(ls -lh dist/main.js | awk '{print $5}')"
          else
            echo "❌ Build failed - main.js not found"
            exit 1
          fi
          
    - name: 🧪 Step 6 - Test environment
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 1m
        script: |
          echo "🧪 ENVIRONMENT TEST STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Test environment
          if node test-env.js; then
            echo "✅ Environment test passed"
          else
            echo "❌ Environment test failed"
            exit 1
          fi
          
    - name: 🚀 Step 7 - Start application
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        script: |
          echo "🚀 START APPLICATION STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Start app
          NODE_ENV=development nohup npm run start:prod > app.log 2>&1 &
          APP_PID=$!
          
          echo "Started app with PID: $APP_PID"
          
          # Wait for startup
          sleep 10
          
          # Check if running
          if ps -p $APP_PID > /dev/null 2>&1; then
            echo "✅ Application is running"
          else
            echo "❌ Application failed to start"
            echo "--- Logs ---"
            tail -20 app.log || echo "No logs"
            exit 1
          fi
          
    - name: 🧪 Step 8 - Test endpoints
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        script: |
          echo "🧪 ENDPOINT TEST STEP"
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Wait for port to be ready
          echo "Waiting for port 3001..."
          for i in {1..30}; do
            if netstat -tuln | grep :3001 > /dev/null; then
              echo "✅ Port 3001 is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Port 3001 not ready after 30 seconds"
              exit 1
            fi
            sleep 1
          done
          
          # Test endpoints
          echo "Testing health endpoint..."
          if curl -f -s -m 10 http://localhost:3001/ > health.json; then
            echo "✅ Health endpoint working"
            echo "Response: $(cat health.json)"
          else
            echo "❌ Health endpoint failed"
            exit 1
          fi
          
          echo "Testing Swagger..."
          if curl -f -s -m 10 http://localhost:3001/api/v1/docs > /dev/null; then
            echo "✅ Swagger working"
          else
            echo "⚠️ Swagger failed"
          fi
          
          echo ""
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "🌐 Health: http://144.91.104.237:3001/"
          echo "📚 Swagger: http://144.91.104.237:3001/api/v1/docs"