name: Production Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          # Configuration
          APP_DIR="/var/www/toeicai/ToeicBoost_BE"
          REPO_URL="https://github.com/NhomNCKH/ToeicBoost_BE.git"
          
          echo "🚀 Starting deployment..."
          
          # Stop existing services
          cd "$APP_DIR" 2>/dev/null || true
          if [ -f "docker-compose.production.yml" ]; then
            docker-compose -f docker-compose.production.yml down || true
          fi
          
          # Kill processes on port 3001
          sudo lsof -ti:3001 | xargs sudo kill -9 2>/dev/null || true
          
          # Update code
          if [ -d "$APP_DIR" ]; then
            cd "$APP_DIR"
            git fetch origin
            git reset --hard origin/main
            git pull origin main
          else
            mkdir -p /var/www/toeicai
            cd /var/www/toeicai
            git clone "$REPO_URL" ToeicBoost_BE
            cd ToeicBoost_BE
          fi
          
          # Verify files exist
          if [ ! -f "docker-compose.production.yml" ]; then
            echo "Creating docker-compose.production.yml..."
            cat > docker-compose.production.yml << 'EOF'
          version: '3.8'
          
          services:
            api:
              build:
                context: .
                dockerfile: Dockerfile
              container_name: toeic-api-prod
              ports:
                - "3001:3001"
              env_file:
                - .env.production
              restart: unless-stopped
              networks:
                - toeic-network
              healthcheck:
                test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
          
          networks:
            toeic-network:
              driver: bridge
          EOF
          fi
          
          # Build and start
          echo "Building and starting services..."
          docker-compose -f docker-compose.production.yml up -d --build
          
          # Wait and check
          sleep 15
          docker-compose -f docker-compose.production.yml ps
          
          echo "✅ Deployment completed!"