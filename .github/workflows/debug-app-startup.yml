name: Debug App Startup

on:
  workflow_dispatch: # Manual trigger only

jobs:
  debug:
    name: Debug App Startup
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Debug Application Startup
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        debug: true
        script: |
          echo "🔍 Debugging application startup..."
          
          cd /var/www/toeicai/ToeicBoost_BE || {
            echo "❌ Project directory not found"
            exit 1
          }
          
          echo "=== Current Status ==="
          echo "Directory: $(pwd)"
          echo "Files:"
          ls -la | head -10
          
          echo "=== Check if app is running ==="
          if pgrep -f "node.*dist/main" > /dev/null; then
            echo "✅ App is currently running"
            echo "Process info:"
            ps aux | grep -E "(node|npm)" | grep -v grep
            echo "Port status:"
            netstat -tlnp | grep :3001 || echo "Port 3001 not listening"
          else
            echo "❌ App is not running"
          fi
          
          echo "=== Check logs ==="
          if [ -f "app.log" ]; then
            echo "Recent logs (last 20 lines):"
            tail -20 app.log
          else
            echo "No app.log file found"
          fi
          
          echo "=== Check build ==="
          if [ -d "dist" ]; then
            echo "✅ dist directory exists"
            ls -la dist/ | head -5
          else
            echo "❌ dist directory not found"
          fi
          
          echo "=== Check package.json scripts ==="
          if [ -f "package.json" ]; then
            echo "Available scripts:"
            grep -A 10 '"scripts"' package.json || echo "Could not find scripts"
          fi
          
          echo "=== Test manual start ==="
          echo "Killing any existing processes..."
          pkill -f "node.*dist/main" 2>/dev/null || echo "No process to kill"
          sleep 2
          
          echo "Starting app manually..."
          NODE_ENV=production npm run start:prod > manual-start.log 2>&1 &
          MANUAL_PID=$!
          echo "Started with PID: $MANUAL_PID"
          
          echo "Waiting 30 seconds..."
          sleep 30
          
          echo "Checking manual start..."
          if kill -0 $MANUAL_PID 2>/dev/null; then
            echo "✅ Manual process is running"
          else
            echo "❌ Manual process died"
          fi
          
          echo "Manual start logs:"
          cat manual-start.log 2>/dev/null || echo "No manual logs"
          
          echo "Port check:"
          netstat -tlnp | grep :3001 || echo "Port 3001 not listening"
          
          echo "HTTP test:"
          curl -v http://localhost:3001/ 2>&1 | head -10 || echo "HTTP test failed"
          
          echo "=== Environment Check ==="
          echo "NODE_ENV: $NODE_ENV"
          echo "PATH: $PATH"
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          
          echo "=== .env file ==="
          if [ -f ".env" ]; then
            echo ".env exists, first 10 lines:"
            head -10 .env
          else
            echo "No .env file"
          fi
          
          # Cleanup
          kill $MANUAL_PID 2>/dev/null || echo "Manual process already stopped"