name: Check Server Status

on:
  workflow_dispatch: # Manual trigger only

jobs:
  check:
    name: Check Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Basic Server Check
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        script: |
          echo "=== BASIC SERVER INFO ==="
          echo "User: $(whoami)"
          echo "Home: $HOME"
          echo "Current dir: $(pwd)"
          echo "Date: $(date)"
          
          echo ""
          echo "=== SYSTEM INFO ==="
          uname -a
          cat /etc/os-release | head -5
          
          echo ""
          echo "=== DISK SPACE ==="
          df -h | head -5
          
          echo ""
          echo "=== MEMORY ==="
          free -h
          
          echo ""
          echo "=== PROCESSES ==="
          ps aux | head -10
          
          echo ""
          echo "=== NETWORK ==="
          netstat -tlnp | grep :3001 || echo "Port 3001 not in use"
          
          echo ""
          echo "=== NODE.JS CHECK ==="
          which node || echo "Node.js not found"
          node --version 2>/dev/null || echo "Node.js not working"
          which npm || echo "npm not found"
          npm --version 2>/dev/null || echo "npm not working"
          
          echo ""
          echo "=== GIT CHECK ==="
          which git || echo "Git not found"
          git --version 2>/dev/null || echo "Git not working"
          
          echo ""
          echo "=== PROJECT DIRECTORY ==="
          if [ -d "/var/www" ]; then
            echo "✅ /var/www exists"
            ls -la /var/www/ 2>/dev/null || echo "Cannot list /var/www"
          else
            echo "❌ /var/www does not exist"
          fi
          
          if [ -d "/var/www/toeicai" ]; then
            echo "✅ /var/www/toeicai exists"
            ls -la /var/www/toeicai/ 2>/dev/null || echo "Cannot list /var/www/toeicai"
          else
            echo "❌ /var/www/toeicai does not exist"
          fi
          
          if [ -d "/var/www/toeicai/ToeicBoost_BE" ]; then
            echo "✅ Project directory exists"
            cd /var/www/toeicai/ToeicBoost_BE
            echo "Project files:"
            ls -la | head -10
            echo "Git status:"
            git status --porcelain 2>/dev/null || echo "Git status failed"
          else
            echo "❌ Project directory does not exist"
          fi
          
          echo ""
          echo "=== SSH KEYS ==="
          if [ -f ~/.ssh/github_deploy ]; then
            echo "✅ GitHub deploy key exists"
            ls -la ~/.ssh/github_deploy*
          else
            echo "❌ GitHub deploy key missing"
          fi
          
          if [ -f ~/.ssh/config ]; then
            echo "✅ SSH config exists"
            cat ~/.ssh/config
          else
            echo "❌ SSH config missing"
          fi
          
          echo ""
          echo "=== GITHUB SSH TEST ==="
          ssh -T git@github.com 2>&1 | head -3 || echo "GitHub SSH test completed"
          
          echo ""
          echo "✅ Server check completed"