name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          echo "📁 Navigating to project directory..."
          cd /var/www/toeicai/ToeicBoost_BE
          
          echo "🔄 Pulling latest code from main branch..."
          git fetch origin
          git checkout main
          git pull origin main
          
          echo "📦 Installing dependencies..."
          npm ci --production=false
          
          echo "🏗️ Building project..."
          npm run build
          
          echo "🔄 Stopping existing application..."
          # Kill existing process gracefully
          pkill -f "node.*dist/main.js" || true
          pkill -f "npm.*start:prod" || true
          sleep 3
          
          echo "🌍 Setting up environment..."
          # Ensure NODE_ENV is set to development to enable Swagger
          export NODE_ENV=development
          
          echo "🚀 Starting new application..."
          # Start new process
          nohup npm run start:prod > app.log 2>&1 &
          
          echo "⏳ Waiting for application to start..."
          sleep 8
          
          # Health check with detailed output
          echo "🔍 Checking application status..."
          if pgrep -f "node.*dist/main.js" > /dev/null; then
            echo "✅ Application process is running"
            
            # Wait a bit more for the app to fully initialize
            sleep 5
            
            # Test health endpoint
            echo "🏥 Testing health endpoint..."
            if curl -f -s http://localhost:3001/ > /dev/null; then
              echo "✅ Health endpoint (/) is responding"
            else
              echo "❌ Health endpoint (/) failed"
              echo "📋 Checking logs..."
              tail -10 app.log || echo "No logs found"
            fi
            
            # Test detailed health endpoint
            echo "� Testing detailed health endpoint..."
            if curl -f -s http://localhost:3001/health > /dev/null; then
              echo "✅ Detailed health endpoint (/health) is responding"
            else
              echo "❌ Detailed health endpoint (/health) failed"
            fi
            
            # Test Swagger docs
            echo "📚 Testing Swagger documentation..."
            if curl -f -s http://localhost:3001/api/v1/docs > /dev/null; then
              echo "✅ Swagger docs (/api/v1/docs) is responding"
            else
              echo "❌ Swagger docs (/api/v1/docs) failed"
            fi
            
            # Test auth API
            echo "🔐 Testing auth API..."
            if curl -f -s http://localhost:3001/api/v1/auth/register -X POST -H "Content-Type: application/json" -d '{}' > /dev/null 2>&1; then
              echo "✅ Auth API is responding (expected validation error)"
            else
              echo "⚠️ Auth API test failed"
            fi
            
            echo "📊 Application URLs:"
            echo "  🏥 Health: http://144.91.104.237:3001/"
            echo "  🏥 Health Detail: http://144.91.104.237:3001/health"
            echo "  📚 Swagger: http://144.91.104.237:3001/api/v1/docs"
            echo "  🔐 Auth API: http://144.91.104.237:3001/api/v1/auth/*"
            
          else
            echo "❌ Application failed to start"
            echo "📋 Last 30 lines of logs:"
            tail -30 app.log || echo "No logs found"
            echo "📋 Process list:"
            ps aux | grep -E "(node|npm)" | grep -v grep || echo "No Node.js processes found"
            exit 1
          fi
          
          echo "🎉 Deployment completed successfully!"
          
    - name: 📊 Deployment Status
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "🌐 API: http://${{ secrets.SERVER_HOST }}:3001"
        echo "📚 Docs: http://${{ secrets.SERVER_HOST }}:3001/api_v1/docs"
        echo "🏥 Health: http://${{ secrets.SERVER_HOST }}:3001/"
        
    - name: 🚨 Notify on failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "Please check the logs and server status."