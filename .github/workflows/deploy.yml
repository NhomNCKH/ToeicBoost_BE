name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        script: |
          set -e
          
          echo "� DEPLOYING TO PRODUCTION..."
          
          # Navigate to project
          cd /var/www/toeicai/ToeicBoost_BE
          
          # Stop existing app
          echo "🛑 Stopping existing application..."
          pkill -f "node.*dist/main.js" || true
          pkill -f "npm.*start:prod" || true
          lsof -ti:3001 | xargs kill -9 || true
          sleep 5
          
          # Update code
          echo "📥 Updating code..."
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          
          # Setup environment
          echo "� Setting up environment..."
          if [ ! -f .env ]; then
            cp .env.example .env
            sed -i 's/DB_HOST=localhost/DB_HOST=144.91.104.237/' .env
            sed -i 's/DB_PORT=5432/DB_PORT=5433/' .env
            sed -i 's/DB_USERNAME=postgres/DB_USERNAME=toeicai_user/' .env
            sed -i 's/DB_PASSWORD=postgres/DB_PASSWORD=StrongPassword123!/' .env
            sed -i 's/DB_DATABASE=toeic_ai/DB_DATABASE=toeicai/' .env
          fi
          
          # Install and build
          echo "📦 Installing dependencies..."
          npm install
          
          echo "�️ Building project..."
          npm run build
          
          # Verify build
          if [ ! -f dist/main.js ]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          # Start application
          echo "🚀 Starting application..."
          NODE_ENV=development nohup npm run start:prod > app.log 2>&1 &
          
          # Wait for startup
          echo "⏳ Waiting for startup..."
          sleep 20
          
          # Verify it's running
          if curl -f -s -m 10 http://localhost:3001/ > /dev/null; then
            echo "✅ Application is running successfully!"
            echo "🌐 Available at: http://144.91.104.237:3001/"
          else
            echo "❌ Application failed to start"
            tail -20 app.log || echo "No logs"
            exit 1
          fi
          
    - name: ✅ Success
      if: success()
      run: |
        echo "🎉 Deployment successful!"
        echo "API: http://${{ secrets.SERVER_HOST }}:3001"
        echo "Swagger: http://${{ secrets.SERVER_HOST }}:3001/api/v1/docs"