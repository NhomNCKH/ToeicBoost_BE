name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          echo "📁 Navigating to project directory..."
          cd /var/www/toeicai/ToeicBoost_BE
          
          echo "🔄 Pulling latest code from main branch..."
          git fetch origin
          git checkout main
          git pull origin main
          
          echo "📦 Installing dependencies..."
          npm ci --production=false
          
          echo "🏗️ Building project..."
          npm run build
          
          echo "🔄 Restarting application..."
          # Kill existing process gracefully
          pkill -f "node.*dist/main.js" || true
          sleep 3
          
          # Start new process
          nohup npm run start:prod > app.log 2>&1 &
          
          echo "⏳ Waiting for application to start..."
          sleep 5
          
          # Health check
          if pgrep -f "node.*dist/main.js" > /dev/null; then
            echo "✅ Application is running"
            
            # Test API endpoints
            if curl -f -s http://localhost:3001/ > /dev/null; then
              echo "✅ Health check passed"
            else
              echo "❌ Health check failed"
              exit 1
            fi
            
            if curl -f -s http://localhost:3001/api_v1/auth/register -X POST -H "Content-Type: application/json" -d '{}' > /dev/null 2>&1; then
              echo "✅ Auth API is responding"
            else
              echo "⚠️ Auth API test failed (expected for invalid input)"
            fi
            
          else
            echo "❌ Application failed to start"
            echo "📋 Last 20 lines of logs:"
            tail -20 app.log || echo "No logs found"
            exit 1
          fi
          
          echo "🎉 Deployment completed successfully!"
          
    - name: 📊 Deployment Status
      if: success()
      run: |
        echo "✅ Deployment successful!"
        echo "🌐 API: http://${{ secrets.SERVER_HOST }}:3001"
        echo "📚 Docs: http://${{ secrets.SERVER_HOST }}:3001/api_v1/docs"
        echo "🏥 Health: http://${{ secrets.SERVER_HOST }}:3001/"
        
    - name: 🚨 Notify on failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        echo "Please check the logs and server status."