name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manual trigger also available

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 5m
        script: |
          echo "🚀 Starting deployment..."
          
          # Navigate to project directory
          cd /var/www/toeicai/ToeicBoost_BE || exit 1
          
          # Kill existing processes
          sudo kill -9 $(sudo lsof -t -i:3001) 2>/dev/null || true
          pkill -f "node.*dist/main.js" || true
          pkill -f "npm.*start:prod" || true
          sleep 5
          
          # Check current git status
          echo "Current git status:"
          git status
          git log --oneline -3
          
          # Ensure we're using SSH for git operations
          git remote set-url origin git@github.com:NhomNCKH/ToeicBoost_BE.git
          
          # Test SSH connection
          ssh -T git@github.com || echo "SSH test completed"
          
          # Force update to latest code
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          
          echo "After git pull:"
          git log --oneline -3
          
          # Install dependencies
          npm install --production=false
          
          # Build project
          npm run build
          
          # Start application
          NODE_ENV=development nohup npm run start:prod > app.log 2>&1 &
          
          # Wait for startup
          sleep 15
          
          # Health check with detailed output
          echo "Testing health endpoints:"
          curl -s http://localhost:3001/ || echo "Root endpoint failed"
          curl -s http://localhost:3001/health || echo "Health endpoint failed"
          
          # Check if app is running
          if curl -s http://localhost:3001/ | grep -q "TOEIC AI API is running"; then
            echo "✅ Deployment successful - API is responding"
          else
            echo "❌ Health check failed - checking logs:"
            tail -20 app.log
            exit 1
          fi
          
    - name: ✅ Success notification
      if: success()
      run: echo "🎉 Deployment completed successfully!"