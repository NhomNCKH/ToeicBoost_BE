name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manual trigger also available

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 30m
        debug: true
        script: |
          set -e  # Exit on any error
          echo "🚀 Starting deployment..."
          
          # Navigate to project directory
          echo "📁 Navigating to project directory..."
          cd /var/www/toeicai/ToeicBoost_BE || {
            echo "❌ Failed to navigate to project directory"
            echo "Creating project directory..."
            mkdir -p /var/www/toeicai
            cd /var/www/toeicai
            git clone git@github.com:NhomNCKH/ToeicBoost_BE.git || {
              echo "❌ Failed to clone repository"
              exit 1
            }
            cd ToeicBoost_BE
          }
          
          # Kill existing processes quickly
          echo "🔄 Stopping existing processes..."
          pkill -f "node.*dist/main" 2>/dev/null || echo "No node process found"
          pkill -f "npm.*start:prod" 2>/dev/null || echo "No npm process found"
          sleep 2
          
          # Ensure we're using SSH for git operations
          echo "🔧 Setting up git remote..."
          git remote set-url origin git@github.com:NhomNCKH/ToeicBoost_BE.git
          
          # Force update to latest code (faster method)
          echo "📥 Fetching latest code..."
          git fetch origin main --depth=1 || {
            echo "❌ Failed to fetch from origin"
            exit 1
          }
          
          git reset --hard origin/main || {
            echo "❌ Failed to reset to origin/main"
            exit 1
          }
          
          # Install dependencies with cache
          echo "📦 Installing dependencies..."
          npm ci --production=false || {
            echo "❌ Failed to install dependencies"
            exit 1
          }
          
          # Build project
          echo "🏗️ Building project..."
          npm run build || {
            echo "❌ Failed to build project"
            exit 1
          }
          
          # Start application in background
          echo "🚀 Starting application..."
          NODE_ENV=production nohup npm run start:prod > app.log 2>&1 &
          APP_PID=$!
          echo "Application started with PID: $APP_PID"
          
          # Quick health check
          echo "⏳ Waiting for application startup..."
          sleep 10
          
          # Check if process is still running
          if kill -0 $APP_PID 2>/dev/null; then
            echo "✅ Application process is running (PID: $APP_PID)"
          else
            echo "❌ Application process died"
            echo "📋 Recent logs:"
            tail -20 app.log || echo "No logs found"
            exit 1
          fi
          
          # Quick endpoint test
          echo "🏥 Testing application..."
          for i in {1..6}; do
            if curl -s --connect-timeout 5 http://localhost:3001/ > /dev/null; then
              echo "✅ Application is responding"
              break
            else
              echo "⏳ Waiting for app to start... ($i/6)"
              sleep 5
            fi
            
            if [ $i -eq 6 ]; then
              echo "❌ Application not responding after 30 seconds"
              echo "📋 Recent logs:"
              tail -20 app.log || echo "No logs found"
              exit 1
            fi
          done
          
          echo "🎉 Deployment completed successfully!"
          
    - name: ✅ Success notification
      if: success()
      run: echo "🎉 Deployment completed successfully!"