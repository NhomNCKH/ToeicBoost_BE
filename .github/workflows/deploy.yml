name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 📦 Create deployment package
      run: |
        # Create deployment directory
        mkdir -p deploy-package
        
        # Copy built application
        cp -r dist deploy-package/
        
        # Copy package files (only production dependencies)
        cp package.json deploy-package/
        cp package-lock.json deploy-package/
        
        # Copy other necessary files
        cp -r src deploy-package/ 2>/dev/null || true
        
        # Create deployment info
        echo "Build Date: $(date)" > deploy-package/build-info.txt
        echo "Commit: $(git rev-parse HEAD)" >> deploy-package/build-info.txt
        echo "Branch: $(git branch --show-current)" >> deploy-package/build-info.txt
        
        # Create archive
        tar -czf deployment.tar.gz -C deploy-package .
        
    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: deployment.tar.gz
        retention-days: 30

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    
    steps:
    - name: 📥 Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        
    - name: 🚀 Deploy to server
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        sync: true
        script: |
          echo "🚀 DEPLOYMENT STARTING..."
          
          PROJECT_DIR="/var/www/toeicai/ToeicBoost_BE"
          
          # 1. SAFE CLEANUP - chỉ kill bằng PID
          echo "🧹 Safely stopping existing processes..."
          
          if [ -f app.pid ]; then
            OLD_PID=$(cat app.pid)
            echo "Found existing PID: $OLD_PID"
            
            if kill -0 $OLD_PID 2>/dev/null; then
              echo "Stopping process $OLD_PID..."
              kill $OLD_PID 2>/dev/null || true
              sleep 5
              
              if kill -0 $OLD_PID 2>/dev/null; then
                echo "Force killing process $OLD_PID..."
                kill -9 $OLD_PID 2>/dev/null || true
              fi
            fi
            
            rm -f app.pid
          else
            echo "No PID file found"
          fi
          
          # 2. Safe port cleanup only
          echo "🔌 Checking port 3001..."
          PORT_PIDS=$(lsof -ti:3001 2>/dev/null || true)
          if [ -n "$PORT_PIDS" ]; then
            echo "Found processes on port 3001: $PORT_PIDS"
            echo "$PORT_PIDS" | xargs -r kill 2>/dev/null || true
            sleep 2
          else
            echo "Port 3001 is free"
          fi
          
          echo "✅ Safe cleanup completed"
          
          # 2. PREPARE DEPLOYMENT DIRECTORY
          echo "📁 Preparing deployment directory..."
          sudo mkdir -p "$PROJECT_DIR"
          sudo chown -R $USER:$USER /var/www/toeicai
          cd "$PROJECT_DIR"
          
          # 3. BACKUP CURRENT VERSION (if exists)
          if [ -d "current" ]; then
            echo "💾 Backing up current version..."
            rm -rf backup 2>/dev/null || true
            mv current backup 2>/dev/null || true
          fi
          
          # 4. CREATE NEW DEPLOYMENT DIRECTORY
          mkdir -p current
          cd current
          
    - name: 📤 Transfer build artifacts
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "deployment.tar.gz"
        target: "/var/www/toeicai/ToeicBoost_BE/current/"
        
    - name: 🔧 Extract and setup application
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 10m
        sync: true
        script: |
          echo "🔧 EXTRACTING AND SETTING UP APPLICATION..."
          
          cd /var/www/toeicai/ToeicBoost_BE/current
          
          # Extract deployment package
          echo "📦 Extracting deployment package..."
          tar -xzf deployment.tar.gz
          rm deployment.tar.gz
          
          # Show build info
          echo "📋 Build Information:"
          cat build-info.txt 2>/dev/null || echo "No build info available"
          
          # Install production dependencies only
          echo "📦 Installing production dependencies..."
          npm ci --only=production
          
          # Verify build
          if [ ! -f "dist/main.js" ]; then
            echo "❌ Build verification failed - main.js not found"
            ls -la dist/ 2>/dev/null || echo "dist directory not found"
            exit 1
          fi
          echo "✅ Build verification successful"
          
          # Copy environment file if exists in backup
          if [ -f "../backup/.env" ]; then
            echo "📋 Copying environment file from backup..."
            cp ../backup/.env .env
          elif [ ! -f ".env" ]; then
            echo "⚠️ No .env file found - creating basic one..."
            cat > .env << 'EOF'
          NODE_ENV=production
          PORT=3001
          EOF
          fi
          
          # Start application
          echo "🚀 Starting application..."
          export NODE_ENV=production
          nohup npm run start:prod > app.log 2>&1 &
          APP_PID=$!
          echo $APP_PID > app.pid
          echo "📝 Application started with PID: $APP_PID"
          
          # Monitor startup
          echo "⏳ Monitoring startup for 30 seconds..."
          for i in {1..30}; do
            if kill -0 $APP_PID 2>/dev/null; then
              echo "⏳ Process running... ($i/30)"
              sleep 1
            else
              echo "❌ Process died at second $i"
              echo "📋 Application logs:"
              tail -30 app.log
              
              # Rollback to backup if available
              if [ -d "../backup" ]; then
                echo "🔄 Rolling back to previous version..."
                cd ..
                rm -rf current
                mv backup current
                cd current
                nohup npm run start:prod > app.log 2>&1 &
                echo $! > app.pid
                echo "✅ Rollback completed"
              fi
              exit 1
            fi
          done
          
          # Final health check
          echo "🏥 Final health check..."
          
          # Check port binding
          if sudo lsof -i:3001 >/dev/null 2>&1; then
            echo "✅ Port 3001 is bound"
          else
            echo "❌ Port 3001 not bound"
            echo "📋 Application logs:"
            tail -30 app.log
            exit 1
          fi
          
          # Test HTTP endpoint
          for i in {1..10}; do
            if curl -s --connect-timeout 3 --max-time 5 http://localhost:3001/ >/dev/null 2>&1; then
              echo "✅ HTTP endpoint responding"
              echo "🎉 DEPLOYMENT SUCCESSFUL!"
              echo "📊 Final status:"
              echo "  - Process PID: $APP_PID"
              echo "  - Port: 3001 ✅"
              echo "  - HTTP: ✅"
              
              # Clean up old backup
              rm -rf ../backup 2>/dev/null || true
              
              exit 0
            else
              echo "⏳ Testing HTTP... ($i/10)"
              sleep 2
            fi
          done
          
          echo "⚠️ HTTP endpoint not responding, but process is running"
          echo "📋 Recent logs:"
          tail -20 app.log
          
    - name: ✅ Success notification
      if: success()
      run: echo "🎉 Deployment completed successfully!"
      
    - name: ❌ Failure notification
      if: failure()
      run: echo "❌ Deployment failed - check logs above"