name: Check Logs Only

on:
  workflow_dispatch: # Manual trigger only

jobs:
  check:
    name: Check Application Logs
    runs-on: ubuntu-latest
    
    steps:
    - name: 🔍 Check Application Logs
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        command_timeout: 2m
        debug: true
        script: |
          echo "🔍 Checking application logs..."
          
          cd /var/www/toeicai/ToeicBoost_BE || {
            echo "❌ Project directory not found"
            exit 1
          }
          
          echo "=== CURRENT STATUS ==="
          echo "Directory: $(pwd)"
          echo "Current time: $(date)"
          
          echo "=== PROCESS CHECK ==="
          if pgrep -f "node.*dist/main" > /dev/null; then
            echo "✅ Node process is running"
            echo "Process details:"
            ps aux | grep -E "(node|npm)" | grep -v grep
          else
            echo "❌ No node process found"
          fi
          
          echo "=== PORT CHECK ==="
          if netstat -tlnp | grep :3001 >/dev/null 2>&1; then
            echo "✅ Port 3001 is listening"
            netstat -tlnp | grep :3001
          else
            echo "❌ Port 3001 not listening"
          fi
          
          echo "=== LOG FILES CHECK ==="
          echo "Available log files:"
          ls -la *.log 2>/dev/null || echo "No .log files found"
          
          if [ -f "app.log" ]; then
            echo "=== APP.LOG CONTENT ==="
            echo "File size: $(wc -l < app.log) lines"
            echo "Last modified: $(stat -c %y app.log)"
            echo ""
            echo "Full app.log content:"
            cat app.log
          else
            echo "❌ app.log file not found"
          fi
          
          echo "=== MANUAL TEST ==="
          echo "Testing HTTP connection..."
          curl -v http://localhost:3001/ 2>&1 | head -20 || echo "HTTP test failed"
          
          echo "=== ENVIRONMENT CHECK ==="
          if [ -f ".env" ]; then
            echo "✅ .env file exists"
            echo ".env content (first 10 lines):"
            head -10 .env
          else
            echo "❌ .env file missing"
          fi
          
          echo "=== BUILD CHECK ==="
          if [ -f "dist/main.js" ]; then
            echo "✅ dist/main.js exists"
            echo "File size: $(ls -lh dist/main.js | awk '{print $5}')"
          else
            echo "❌ dist/main.js missing"
            echo "Dist directory contents:"
            ls -la dist/ 2>/dev/null || echo "No dist directory"
          fi
          
          echo "=== PACKAGE.JSON CHECK ==="
          if [ -f "package.json" ]; then
            echo "start:prod script:"
            grep -A 1 -B 1 "start:prod" package.json || echo "start:prod script not found"
          fi
          
          echo "🔍 Log check completed!"