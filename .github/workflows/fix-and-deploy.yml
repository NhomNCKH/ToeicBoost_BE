name: Fix and Deploy

on:
  workflow_dispatch: # Manual trigger only

jobs:
  fix-deploy:
    name: Fix Issues and Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test
      
    - name: 🏗️ Build project
      run: npm run build
      
    - name: 🔧 Fix server issues and deploy
      uses: appleboy/ssh-action@v1.1.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          
          echo "🔧 FIXING SERVER ISSUES AND DEPLOYING..."
          echo "======================================="
          
          # Navigate to project directory
          cd /var/www/toeicai/ToeicBoost_BE
          
          echo "🧹 Step 1: Complete cleanup..."
          # Kill ALL Node.js processes
          pkill -f node || true
          pkill -f npm || true
          sleep 5
          
          # Force kill anything on port 3001
          lsof -ti:3001 | xargs kill -9 || true
          sleep 2
          
          # Clean up old files
          rm -f app.log npm-debug.log test_*.log quick_test.log || true
          
          echo "📥 Step 2: Get latest code..."
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          
          echo "🌍 Step 3: Setup environment..."
          # Ensure .env exists
          if [ ! -f .env ]; then
            echo "Creating .env from .env.example..."
            cp .env.example .env
            
            # Update .env with production values
            sed -i 's/NODE_ENV=development/NODE_ENV=development/' .env
            sed -i 's/DB_HOST=localhost/DB_HOST=144.91.104.237/' .env
            sed -i 's/DB_PORT=5432/DB_PORT=5433/' .env
            sed -i 's/DB_USERNAME=postgres/DB_USERNAME=toeicai_user/' .env
            sed -i 's/DB_PASSWORD=postgres/DB_PASSWORD=StrongPassword123!/' .env
            sed -i 's/DB_DATABASE=toeic_ai/DB_DATABASE=toeicai/' .env
          fi
          
          echo "📦 Step 4: Install dependencies..."
          # Clear npm cache
          npm cache clean --force || true
          
          # Remove node_modules and reinstall
          rm -rf node_modules package-lock.json || true
          npm install
          
          echo "🏗️ Step 5: Build project..."
          # Clean build
          rm -rf dist || true
          npm run build
          
          # Verify build
          if [ ! -f dist/main.js ]; then
            echo "❌ Build failed - main.js not found"
            exit 1
          fi
          
          echo "✅ Build successful - main.js size: $(ls -lh dist/main.js | awk '{print $5}')"
          
          echo "🧪 Step 6: Test environment..."
          # Test environment variables
          if node test-env.js; then
            echo "✅ Environment test passed"
          else
            echo "❌ Environment test failed"
            exit 1
          fi
          
          echo "🚀 Step 7: Start application..."
          # Start with explicit environment
          NODE_ENV=development nohup npm run start:prod > app.log 2>&1 &
          APP_PID=$!
          
          echo "Started app with PID: $APP_PID"
          
          # Wait for startup
          echo "⏳ Waiting for application startup..."
          sleep 15
          
          # Check if process is running
          if ps -p $APP_PID > /dev/null 2>&1; then
            echo "✅ Application process is running"
          else
            echo "❌ Application process died"
            echo "--- App logs ---"
            tail -20 app.log || echo "No logs"
            exit 1
          fi
          
          # Wait for port to be ready
          echo "⏳ Waiting for port 3001..."
          for i in {1..30}; do
            if netstat -tuln | grep :3001 > /dev/null; then
              echo "✅ Port 3001 is listening"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Port 3001 not ready after 30 seconds"
              echo "--- App logs ---"
              tail -20 app.log || echo "No logs"
              exit 1
            fi
            sleep 1
          done
          
          echo "🧪 Step 8: Test endpoints..."
          
          # Test health endpoint
          if curl -f -s -m 10 http://localhost:3001/ > health_response.json; then
            echo "✅ Health endpoint working"
            echo "Response: $(cat health_response.json)"
          else
            echo "❌ Health endpoint failed"
            echo "--- App logs ---"
            tail -20 app.log || echo "No logs"
            exit 1
          fi
          
          # Test detailed health
          if curl -f -s -m 10 http://localhost:3001/health > health_detail_response.json; then
            echo "✅ Health detail endpoint working"
          else
            echo "⚠️ Health detail endpoint failed"
          fi
          
          # Test Swagger
          if curl -f -s -m 10 http://localhost:3001/api/v1/docs > swagger_response.html; then
            echo "✅ Swagger endpoint working ($(wc -c < swagger_response.html) bytes)"
          else
            echo "⚠️ Swagger endpoint failed"
          fi
          
          # Test auth API
          if curl -f -s -m 10 -X POST -H "Content-Type: application/json" -d '{}' http://localhost:3001/api/v1/auth/register > auth_response.json 2>&1; then
            echo "✅ Auth API responding"
          else
            echo "⚠️ Auth API test: $(cat auth_response.json 2>/dev/null || echo 'No response')"
          fi
          
          echo ""
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "========================"
          echo "🌐 Health: http://144.91.104.237:3001/"
          echo "🏥 Health Detail: http://144.91.104.237:3001/health"
          echo "📚 Swagger: http://144.91.104.237:3001/api/v1/docs"
          echo "🔐 Auth API: http://144.91.104.237:3001/api/v1/auth/*"
          echo ""
          echo "📋 Application Status:"
          echo "   PID: $APP_PID"
          echo "   Memory: $(ps -p $APP_PID -o rss= 2>/dev/null | awk '{print int($1/1024)"MB"}' || echo 'Unknown')"
          echo "   Uptime: $(ps -p $APP_PID -o etime= 2>/dev/null || echo 'Unknown')"